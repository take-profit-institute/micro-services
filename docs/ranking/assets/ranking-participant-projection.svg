<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="920" viewBox="0 0 1800 920">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080F1D"/><stop offset="1" stop-color="#161229"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity=".35"/></filter><marker id="a" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#B794F4"/></marker><style>.t{font:750 36px Inter,Arial;fill:#F8FAFC}.s{font:500 17px Inter,Arial;fill:#A89BB9}.k{font:700 14px Inter,Arial;letter-spacing:2px;fill:#C4B5FD}.h{font:700 18px Inter,Arial;fill:#FAF5FF}.b{font:500 14px Inter,Arial;fill:#C8BDD7}.x{font:600 12px Inter,Arial;fill:#A89BB9}.ln{fill:none;stroke:#B794F4;stroke-width:2.5;marker-end:url(#a)}</style></defs>
  <rect width="1800" height="920" rx="34" fill="url(#bg)"/><text x="70" y="70" class="t">PARTICIPANT PROJECTION · EVENT-SAFE READ MODEL</text><text x="70" y="102" class="s">세 이벤트를 한 참가자 투영으로 합치되, 소비 이력과 상태 변경을 같은 transaction에 저장합니다.</text>
  <text x="70" y="158" class="k">01 · SOURCE EVENTS</text>
  <g filter="url(#sh)"><rect x="70" y="185" width="360" height="135" rx="22" fill="#3B2430" stroke="#FF7A70"/><text x="100" y="225" class="h">AUTH · UserCreated</text><text x="100" y="254" class="b">eventId · userId · email · occurredAt</text><text x="100" y="280" class="x">topic · auth.user-created.v1</text><text x="100" y="301" class="x">dedup · auth-service + eventId</text><rect x="70" y="355" width="360" height="135" rx="22" fill="#172A3A" stroke="#4DA3FF"/><text x="100" y="395" class="h">USER · UserProfileUpdated</text><text x="100" y="424" class="b">eventId · userId · nickname · occurredAt</text><text x="100" y="450" class="x">topic · user.profile-updated.v1</text><text x="100" y="471" class="x">dedup · user-service + eventId</text><rect x="70" y="525" width="360" height="135" rx="22" fill="#4A2028" stroke="#FF7A70"/><text x="100" y="565" class="h">TRADING · OrderFilled</text><text x="100" y="594" class="b">orderId · userId · executedQuantity</text><text x="100" y="620" class="x">topic · orderFilled</text><text x="100" y="641" class="x">dedup · trading-service + orderId</text></g>

  <text x="550" y="158" class="k">02 · VALIDATE &amp; PROJECT</text>
  <g filter="url(#sh)"><rect x="550" y="185" width="460" height="475" rx="28" fill="#2D1B4E" stroke="#B794F4" stroke-width="2"/><text x="580" y="228" class="h">Kafka Consumers</text><text x="580" y="258" class="b">JSON parse · event type/version · UUID · required fields</text><rect x="580" y="290" width="400" height="88" rx="16" fill="#211735" stroke="#72519C"/><text x="605" y="323" class="h">UserCreatedConsumer</text><text x="605" y="350" class="x">registerParticipant()</text><rect x="580" y="398" width="400" height="88" rx="16" fill="#211735" stroke="#72519C"/><text x="605" y="431" class="h">UserProfileUpdatedConsumer</text><text x="605" y="458" class="x">projectProfile()</text><rect x="580" y="506" width="400" height="88" rx="16" fill="#211735" stroke="#72519C"/><text x="605" y="539" class="h">OrderFilledConsumer</text><text x="605" y="566" class="x">projectFilledOrder()</text><text x="580" y="632" class="b">DefaultRankingParticipantProjectionService</text></g>

  <text x="1140" y="158" class="k">03 · ATOMIC RESULT</text>
  <g filter="url(#sh)"><rect x="1140" y="185" width="590" height="230" rx="26" fill="#263442" stroke="#94A3B8" stroke-width="2"/><text x="1170" y="228" class="h">ranking_participants</text><text x="1170" y="261" class="b">nickname · trade_count · user_status · account_status</text><text x="1170" y="294" class="b">UserCreated → ACTIVE/ACTIVE · count 0</text><text x="1170" y="327" class="b">ProfileUpdated → newest nickname only</text><text x="1170" y="360" class="b">OrderFilled → atomic trade_count + 1</text><rect x="1140" y="450" width="590" height="210" rx="26" fill="#263442" stroke="#94A3B8" stroke-width="2"/><text x="1170" y="493" class="h">ranking_consumed_events</text><text x="1170" y="526" class="b">PRIMARY KEY · source_service + event_id</text><text x="1170" y="559" class="b">same event → no participant mutation</text><text x="1170" y="592" class="b">participant mutation + consumed row = one transaction</text><text x="1170" y="625" class="x">failure rolls back both records</text></g>
  <path d="M430 252H540" class="ln"/><path d="M430 422H540" class="ln"/><path d="M430 592H540" class="ln"/><path d="M1010 320H1130" class="ln"/><path d="M1010 550H1130" class="ln"/>
  <rect x="70" y="740" width="1660" height="100" rx="22" fill="#171D2B" stroke="#49566A"/><circle cx="105" cy="790" r="9" fill="#22C997"/><text x="130" y="783" class="h">RANKING ELIGIBILITY INPUT</text><text x="130" y="812" class="b">trade_count ≥ 5 · user_status ACTIVE · account_status ACTIVE · Portfolio EOD snapshot exists</text><text x="1250" y="800" class="x">current limitation · status change events not implemented</text>
</svg>
