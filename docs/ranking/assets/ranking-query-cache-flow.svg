<svg preserveAspectRatio="xMidYMid meet" text-rendering="geometricPrecision" shape-rendering="geometricPrecision" xmlns="http://www.w3.org/2000/svg" width="3600" height="1920" viewBox="0 0 1800 960">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080F1D"/><stop offset="1" stop-color="#171329"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity=".35"/></filter><marker id="a" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#B794F4"/></marker><marker id="g" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#22C997"/></marker><marker id="o" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#FF9F43"/></marker><style>.t{font:750 36px Inter,Arial;fill:#F8FAFC}.s{font:500 17px Inter,Arial;fill:#A89BB9}.k{font:700 14px Inter,Arial;letter-spacing:2px;fill:#C4B5FD}.h{font:700 18px Inter,Arial;fill:#FAF5FF}.b{font:500 14px Inter,Arial;fill:#C8BDD7}.x{font:600 12px Inter,Arial;fill:#A89BB9}.ln{fill:none;stroke:#B794F4;stroke-width:2.5;marker-end:url(#a)}.hit{fill:none;stroke:#22C997;stroke-width:2.5;marker-end:url(#g)}.miss{fill:none;stroke:#FF9F43;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#o)}</style></defs>
  <rect width="1800" height="960" rx="34" fill="url(#bg)"/><text x="70" y="70" class="t">RANKING QUERY · REDIS CACHE-ASIDE</text><text x="70" y="102" class="s">DB의 마지막 완료일을 기준으로 Redis를 사용하고, miss·장애·오래된 날짜는 PostgreSQL에서 복구합니다.</text>
  <text x="70" y="160" class="k">01 · REQUEST</text><g><rect x="70" y="190" width="330" height="125" rx="22" fill="#172A3A" stroke="#4DA3FF"/><text x="100" y="232" class="h">ListRankings</text><text x="100" y="262" class="b">page size 20 · max 100</text><text x="100" y="288" class="x">cursor · date + last position</text><rect x="70" y="355" width="330" height="125" rx="22" fill="#172A3A" stroke="#4DA3FF"/><text x="100" y="397" class="h">GetMyRanking</text><text x="100" y="427" class="b">request user = x-user-id</text><text x="100" y="453" class="x">different actor → PERMISSION_DENIED</text></g>

  <text x="500" y="160" class="k">02 · QUERY SERVICE</text><g><rect x="500" y="190" width="420" height="290" rx="26" fill="#2D1B4E" stroke="#B794F4" stroke-width="2"/><text x="530" y="232" class="h">DefaultRankingQueryService</text><rect x="530" y="265" width="360" height="72" rx="15" fill="#211735" stroke="#72519C"/><text x="550" y="294" class="b">1 · DB latest completed date</text><text x="550" y="317" class="x">ranking_runs MAX(ranking_date)</text><rect x="530" y="355" width="360" height="92" rx="15" fill="#211735" stroke="#72519C"/><text x="550" y="384" class="b">2 · Redis TOP/user lookup</text><text x="550" y="408" class="x">exception → cache miss</text><text x="550" y="430" class="x">miss → PostgreSQL fallback</text></g>

  <text x="1030" y="160" class="k">03 · CACHE &amp; SOURCE OF TRUTH</text><g><rect x="1030" y="190" width="330" height="180" rx="24" fill="#3B1D31" stroke="#FB7185" stroke-width="2"/><text x="1060" y="232" class="h">REDIS · derived cache</text><text x="1060" y="264" class="b">ranking:latest-date</text><text x="1060" y="292" class="b">ranking:&lt;date&gt;:top100</text><text x="1060" y="320" class="b">ranking:&lt;date&gt;:user:&lt;id&gt;</text><text x="1060" y="347" class="x">TTL · 1 day</text><rect x="1030" y="420" width="700" height="180" rx="24" fill="#263442" stroke="#94A3B8" stroke-width="2"/><text x="1060" y="462" class="h">POSTGRESQL · source of truth</text><text x="1060" y="494" class="b">ranking_runs → latest completed date</text><text x="1060" y="522" class="b">ranking_history + ranking_participants → result + current nickname</text><text x="1060" y="550" class="b">TOP query bounded by ranking_position ≤ 100</text><text x="1060" y="578" class="x">DB missing → RANKING_NOT_FOUND</text></g>
  <path d="M400 252H490" class="ln"/><path d="M400 417H490" class="ln"/><path d="M920 280H1020" class="ln"/><path d="M1195 370V410" class="miss"/><text x="1220" y="397" class="x">miss / failure</text><path d="M1030 520C950 520 950 430 920 430" class="ln"/><path d="M1540 420V395H1320V370" class="hit"/><text x="1430" y="386" text-anchor="middle" class="x">DB result → rebuild Redis</text>
  <text x="70" y="690" class="k">04 · RESPONSE POLICY</text><g><rect x="70" y="720" width="500" height="150" rx="22" fill="#171D2B" stroke="#49566A"/><circle cx="105" cy="762" r="9" fill="#22C997"/><text x="132" y="769" class="h">CACHE HIT</text><text x="100" y="805" class="b">Redis protobuf Base64 → RankingResult → gRPC response</text><text x="100" y="833" class="x">TOP page filtering continues after cursor position</text><rect x="650" y="720" width="500" height="150" rx="22" fill="#171D2B" stroke="#49566A"/><circle cx="685" cy="762" r="9" fill="#F4C95D"/><text x="712" y="769" class="h">CACHE MISS / FAILURE</text><text x="680" y="805" class="b">DB result is returned even if Redis write fails</text><text x="680" y="833" class="x">next request retries cache recovery</text><rect x="1230" y="720" width="500" height="150" rx="22" fill="#171D2B" stroke="#49566A"/><circle cx="1265" cy="762" r="9" fill="#FF7A70"/><text x="1292" y="769" class="h">NO COMPLETED RESULT</text><text x="1260" y="805" class="b">Ranking DB has no completed date or user row</text><text x="1260" y="833" class="x">gRPC NOT_FOUND · RANKING_NOT_FOUND</text></g>
</svg>
