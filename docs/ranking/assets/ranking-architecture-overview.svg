<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-labelledby="title desc">
  <title id="title">Ranking Service architecture overview</title><desc id="desc">Events and Batch commands enter Ranking Service, which calls Portfolio and owns PostgreSQL, Redis and Outbox.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080F1D"/><stop offset="1" stop-color="#171329"/></linearGradient>
    <linearGradient id="rank" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#4A2A78"/><stop offset="1" stop-color="#24143F"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#A99BC1" stroke-opacity=".045"/></pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-opacity=".35"/></filter>
    <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#A78BFA"/></marker>
    <marker id="gold" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#F4C95D"/></marker>
    <marker id="orange" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#FF9F43"/></marker>
    <style>.title{font:750 36px Inter,Arial;fill:#F8FAFC}.sub{font:500 17px Inter,Arial;fill:#A89BB9}.kicker{font:700 15px Inter,Arial;letter-spacing:2px;fill:#C4B5FD}.head{font:700 19px Inter,Arial;fill:#FAF5FF}.body{font:500 14px Inter,Arial;fill:#C8BDD7}.tiny{font:600 12px Inter,Arial;fill:#A89BB9}.line{fill:none;stroke:#A78BFA;stroke-width:2.5;marker-end:url(#arr)}.event{fill:none;stroke:#FF9F43;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#orange)}</style>
  </defs>
  <rect width="1800" height="1080" rx="34" fill="url(#bg)"/><rect width="1800" height="1080" rx="34" fill="url(#grid)"/>
  <text x="70" y="72" class="title">CANDLE · RANKING SERVICE ARCHITECTURE</text><text x="70" y="106" class="sub">EVENT PROJECTION · DAILY FINALIZE · CACHE-ASIDE QUERY</text>

  <text x="70" y="162" class="kicker">01 · INPUT PLANE</text>
  <g filter="url(#shadow)">
    <rect x="70" y="190" width="280" height="105" rx="20" fill="#3B2430" stroke="#FF7A70"/><text x="100" y="230" class="head">AUTH / USER</text><text x="100" y="258" class="body">UserCreated · ProfileUpdated</text><text x="100" y="280" class="tiny">Kafka · versioned events</text>
    <rect x="70" y="330" width="280" height="105" rx="20" fill="#4A2028" stroke="#FF7A70"/><text x="100" y="370" class="head">TRADING</text><text x="100" y="398" class="body">OrderFilled</text><text x="100" y="420" class="tiny">Kafka · orderId dedup</text>
    <rect x="70" y="470" width="280" height="105" rx="20" fill="#3A2F0B" stroke="#F4C95D"/><text x="100" y="510" class="head">BATCH :50062</text><text x="100" y="538" class="body">FinalizeDailyRanking</text><text x="100" y="560" class="tiny">16:20 KST · same-date guard</text>
    <rect x="70" y="610" width="280" height="105" rx="20" fill="#172A3A" stroke="#4DA3FF"/><text x="100" y="650" class="head">BFF / CLIENT</text><text x="100" y="678" class="body">ListRankings · GetMyRanking</text><text x="100" y="700" class="tiny">authenticated x-user-id</text>
  </g>

  <g filter="url(#shadow)"><rect x="500" y="170" width="620" height="590" rx="32" fill="url(#rank)" stroke="#B794F4" stroke-width="2.5"/>
    <rect x="532" y="205" width="230" height="34" rx="17" fill="#B794F4" fill-opacity=".15"/><circle cx="554" cy="222" r="6" fill="#D8B4FE"/><text x="572" y="228" class="tiny" fill="#E9D5FF">RANKING SERVICE :50056</text>
    <text x="532" y="285" class="head" font-size="28">Ranking control &amp; read model</text><text x="532" y="315" class="body">PostgreSQL source of truth · Redis derived cache</text>
    <rect x="532" y="350" width="556" height="92" rx="18" fill="#211735" stroke="#72519C"/><text x="558" y="384" class="head">gRPC · Kafka entry</text><text x="558" y="413" class="body">RankingGrpcService · User/Trading Consumers</text>
    <rect x="532" y="465" width="266" height="105" rx="18" fill="#211735" stroke="#72519C"/><text x="558" y="500" class="head">Participant projection</text><text x="558" y="529" class="body">profile · trade count · status</text><text x="558" y="551" class="tiny">event dedup transaction</text>
    <rect x="822" y="465" width="266" height="105" rx="18" fill="#211735" stroke="#72519C"/><text x="848" y="500" class="head">Daily finalize</text><text x="848" y="529" class="body">filter · sort · bulk write</text><text x="848" y="551" class="tiny">idempotency + Outbox</text>
    <rect x="532" y="595" width="556" height="105" rx="18" fill="#211735" stroke="#72519C"/><text x="558" y="630" class="head">Ranking query</text><text x="558" y="659" class="body">TOP 100 cursor · my ranking · DB fallback</text><text x="558" y="681" class="tiny">Redis cache-aside · TTL 1 day</text>
  </g>

  <text x="1240" y="162" class="kicker">02 · EXTERNAL &amp; OWNED DATA</text>
  <g filter="url(#shadow)">
    <rect x="1240" y="190" width="490" height="115" rx="22" fill="#102A43" stroke="#4DA3FF" stroke-width="2"/><text x="1270" y="232" class="head">PORTFOLIO SERVICE :50055</text><text x="1270" y="261" class="body">ListDailyPortfolioSnapshots · page 500</text><text x="1270" y="284" class="tiny">total_asset · cumulative_return_rate</text>
    <rect x="1240" y="345" width="490" height="140" rx="22" fill="#263442" stroke="#94A3B8" stroke-width="2"/><text x="1270" y="387" class="head">POSTGRESQL · ranking schema</text><text x="1270" y="416" class="body">participants · consumed_events · runs</text><text x="1270" y="443" class="body">snapshot · history · idempotency · outbox</text><text x="1270" y="468" class="tiny">domain source of truth</text>
    <rect x="1240" y="525" width="235" height="120" rx="22" fill="#3B1D31" stroke="#FB7185" stroke-width="2"/><text x="1270" y="567" class="head">REDIS</text><text x="1270" y="596" class="body">latest · TOP100 · user</text><text x="1270" y="620" class="tiny">TTL 1 day</text>
    <rect x="1495" y="525" width="235" height="120" rx="22" fill="#4A2B08" stroke="#FF9F43" stroke-width="2"/><text x="1525" y="567" class="head">KAFKA / OUTBOX</text><text x="1525" y="596" class="body">DailyRankingFinalized</text><text x="1525" y="620" class="tiny">at-least-once</text>
  </g>

  <path d="M350 242H490" class="event"/><path d="M350 382H490" class="event"/><path d="M350 522H490" fill="none" stroke="#F4C95D" stroke-width="2.5" marker-end="url(#gold)"/><path d="M350 662H490" class="line"/>
  <path d="M1120 275C1175 275 1180 248 1240 248" class="line"/><path d="M1120 415H1240" class="line"/><path d="M1120 620C1180 620 1180 585 1240 585" class="line"/><path d="M1120 535H1180V500H1612V525" class="event"/>

  <text x="70" y="850" class="kicker">03 · USER-VISIBLE OUTPUT</text>
  <g filter="url(#shadow)"><rect x="70" y="880" width="520" height="120" rx="22" fill="#20162F" stroke="#A78BFA"/><text x="100" y="922" class="head">DAILY LEADERBOARD</text><text x="100" y="952" class="body">last completed date · TOP 100 · stable cursor</text><text x="100" y="978" class="tiny">profit rate DESC → trade count DESC → user ID ASC</text><rect x="640" y="880" width="520" height="120" rx="22" fill="#20162F" stroke="#A78BFA"/><text x="670" y="922" class="head">MY RANKING</text><text x="670" y="952" class="body">authenticated user only · last completed result</text><text x="670" y="978" class="tiny">Redis hit or PostgreSQL fallback</text><rect x="1210" y="880" width="520" height="120" rx="22" fill="#20162F" stroke="#A78BFA"/><text x="1240" y="922" class="head">DOWNSTREAM EVENT</text><text x="1240" y="952" class="body">ranking.daily-finalized.v1</text><text x="1240" y="978" class="tiny">rankingDate · rankedUserCount</text></g>
</svg>
