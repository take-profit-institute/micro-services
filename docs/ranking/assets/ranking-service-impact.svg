<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080F1D"/><stop offset="1" stop-color="#171329"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity=".35"/></filter><style>.t{font:750 36px Inter,Arial;fill:#F8FAFC}.s{font:500 17px Inter,Arial;fill:#A89BB9}.k{font:700 14px Inter,Arial;letter-spacing:2px;fill:#C4B5FD}.h{font:700 18px Inter,Arial;fill:#FAF5FF}.b{font:500 14px Inter,Arial;fill:#C8BDD7}.x{font:600 12px Inter,Arial;fill:#A89BB9}</style></defs>
  <rect width="1800" height="1080" rx="34" fill="url(#bg)"/><text x="70" y="70" class="t">RANKING IMPACT · FAILURE CONTAINMENT</text><text x="70" y="102" class="s">장애는 Ranking 경계에서 격리하며, Portfolio EOD와 이미 commit된 다른 서비스 데이터는 유지합니다.</text>
  <text x="70" y="160" class="k">01 · FAILURE MAP</text>
  <g filter="url(#sh)"><rect x="70" y="190" width="510" height="190" rx="24" fill="#35202A" stroke="#FF7A70" stroke-width="2"/><circle cx="108" cy="230" r="9" fill="#FF7A70"/><text x="135" y="237" class="h">EVENT DELAY</text><text x="100" y="274" class="b">User/Auth → participant or nickname delayed</text><text x="100" y="304" class="b">OrderFilled → trade_count and eligibility delayed</text><text x="100" y="334" class="x">existing completed rankings remain readable</text><rect x="645" y="190" width="510" height="190" rx="24" fill="#2B2440" stroke="#B794F4" stroke-width="2"/><circle cx="683" cy="230" r="9" fill="#B794F4"/><text x="710" y="237" class="h">PORTFOLIO / DATA FAILURE</text><text x="675" y="274" class="b">RPC error or invalid snapshot → Finalize fails</text><text x="675" y="304" class="b">no partial ranking rows or completion marker</text><text x="675" y="334" class="x">recover source → retry same date and key</text><rect x="1220" y="190" width="510" height="190" rx="24" fill="#33271B" stroke="#F4C95D" stroke-width="2"/><circle cx="1258" cy="230" r="9" fill="#F4C95D"/><text x="1285" y="237" class="h">CACHE / EVENT DELIVERY</text><text x="1250" y="274" class="b">Redis failure → PostgreSQL fallback</text><text x="1250" y="304" class="b">Kafka failure → Outbox remains pending</text><text x="1250" y="334" class="x">DB ranking remains source of truth</text></g>

  <text x="70" y="460" class="k">02 · TRANSACTION BOUNDARIES</text>
  <g filter="url(#sh)"><rect x="70" y="490" width="780" height="210" rx="26" fill="#263442" stroke="#94A3B8" stroke-width="2"/><text x="105" y="535" class="h">FINALIZE · ONE DATABASE TRANSACTION</text><text x="105" y="575" class="b">ranking_snapshot + ranking_history + ranking_runs</text><text x="105" y="607" class="b">+ ranking_outbox_events + ranking_idempotency_records</text><text x="105" y="645" class="x">any write failure → rollback all Ranking command records</text><rect x="950" y="490" width="780" height="210" rx="26" fill="#263442" stroke="#94A3B8" stroke-width="2"/><text x="985" y="535" class="h">PROJECTION · ONE EVENT TRANSACTION</text><text x="985" y="575" class="b">ranking_participants mutation</text><text x="985" y="607" class="b">+ ranking_consumed_events dedup record</text><text x="985" y="645" class="x">failure → event can be consumed again without double count</text></g>

  <text x="70" y="780" class="k">03 · USER &amp; SERVICE OUTCOME</text>
  <g filter="url(#sh)"><rect x="70" y="810" width="385" height="170" rx="22" fill="#20162F" stroke="#A78BFA"/><text x="100" y="852" class="h">BATCH</text><text x="100" y="884" class="b">EOD incomplete → Ranking not called</text><text x="100" y="914" class="b">Finalize failed → same key retry</text><text x="100" y="947" class="x">Portfolio EOD is never rolled back</text><rect x="495" y="810" width="385" height="170" rx="22" fill="#20162F" stroke="#A78BFA"/><text x="525" y="852" class="h">TOP RANKING</text><text x="525" y="884" class="b">last completed date remains visible</text><text x="525" y="914" class="b">cursor bounded to TOP 100</text><text x="525" y="947" class="x">new date appears only after commit</text><rect x="920" y="810" width="385" height="170" rx="22" fill="#20162F" stroke="#A78BFA"/><text x="950" y="852" class="h">MY RANKING</text><text x="950" y="884" class="b">authenticated user only</text><text x="950" y="914" class="b">missing user → NOT_FOUND</text><text x="950" y="947" class="x">Redis failure does not block DB result</text><rect x="1345" y="810" width="385" height="170" rx="22" fill="#20162F" stroke="#A78BFA"/><text x="1375" y="852" class="h">DOWNSTREAM</text><text x="1375" y="884" class="b">DailyRankingFinalized at-least-once</text><text x="1375" y="914" class="b">published_at after Kafka success</text><text x="1375" y="947" class="x">consumer must deduplicate event ID</text></g>
</svg>
