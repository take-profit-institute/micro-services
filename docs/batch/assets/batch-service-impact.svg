<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <linearGradient id="impactBg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071521"/><stop offset="1" stop-color="#111A2C"/></linearGradient>
    <filter id="soft"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#000" flood-opacity=".28"/></filter>
    <marker id="impactArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#F4C95D"/></marker>
    <marker id="impactDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#91A4B7"/></marker>
    <style>
      .title{font:700 38px Inter,Arial;fill:#F8FAFC}.subtitle{font:500 17px Inter,Arial;fill:#91A4B7}.section{font:800 14px Inter,Arial;letter-spacing:2px;fill:#F4C95D}.head{font:700 18px Inter,Arial;fill:#F8FAFC}.body{font:500 14px Inter,Arial;fill:#B8C7D4}.tiny{font:600 12px Inter,Arial;fill:#91A4B7}.job{fill:#3A2F0B;stroke:#F4C95D;stroke-width:2}.line{stroke:#F4C95D;stroke-width:2.5;fill:none;marker-end:url(#impactArrow)}.dash{stroke:#91A4B7;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#impactDash)}
    </style>
  </defs>
  <rect width="1800" height="1180" rx="34" fill="url(#impactBg)"/>
  <text x="72" y="68" class="title">SERVICE IMPACT · FAILURE CONTAINMENT MAP</text>
  <text x="72" y="101" class="subtitle">Batch는 실행을 조정하고, 각 서비스는 자신의 데이터·Outbox·복구 경계를 소유합니다.</text>

  <text x="72" y="158" class="section">01 · ORCHESTRATION</text>
  <g filter="url(#soft)">
    <rect x="70" y="185" width="350" height="92" rx="20" class="job"/><text x="245" y="222" text-anchor="middle" class="head">TRADING JOBS</text><text x="245" y="248" text-anchor="middle" class="body">08:30 · 09:00 · 15:30 · 15:40</text>
    <rect x="465" y="185" width="300" height="92" rx="20" class="job"/><text x="615" y="222" text-anchor="middle" class="head">STOCK JOBS</text><text x="615" y="248" text-anchor="middle" class="body">15:40 Close · 16:30 Sync</text>
    <rect x="810" y="185" width="300" height="92" rx="20" class="job"/><text x="960" y="222" text-anchor="middle" class="head">PORTFOLIO EOD</text><text x="960" y="248" text-anchor="middle" class="body">16:00 · businessDate</text>
    <rect x="1155" y="185" width="390" height="92" rx="20" class="job"/><text x="1350" y="222" text-anchor="middle" class="head">DAILY RANKING</text><text x="1350" y="248" text-anchor="middle" class="body">16:20 · EOD completion guard</text>
    <rect x="1590" y="185" width="145" height="92" rx="20" fill="#263442" stroke="#94A3B8" stroke-width="2"/><text x="1662" y="220" text-anchor="middle" class="head">BATCH</text><text x="1662" y="242" text-anchor="middle" class="tiny">metadata</text><text x="1662" y="260" text-anchor="middle" class="tiny">restart</text>
  </g>

  <path d="M245 277V380" class="line"/>
  <path d="M615 277V380" class="line"/>
  <path d="M960 277V380" class="line"/>
  <path d="M1350 277V380" class="line"/>
  <rect x="55" y="325" width="350" height="40" rx="8" fill="#081622"/>
  <text x="72" y="350" class="section">02 · SERVICE-OWNED STATE</text>
  <g filter="url(#soft)">
    <rect x="70" y="380" width="350" height="190" rx="24" fill="#4A2028" stroke="#FF7A70" stroke-width="2"/><text x="245" y="418" text-anchor="middle" class="head">TRADING</text><text x="245" y="449" text-anchor="middle" class="body">reservation.reservations</text><text x="245" y="475" text-anchor="middle" class="body">order_svc.orders · executions</text><text x="245" y="501" text-anchor="middle" class="body">account balances</text><text x="245" y="527" text-anchor="middle" class="body">domain Outbox events</text><rect x="152" y="540" width="186" height="24" rx="12" fill="#6B2A35"/><text x="245" y="557" text-anchor="middle" class="tiny" fill="#FFF4F2">transaction owner</text>
    <rect x="465" y="380" width="300" height="190" rx="24" fill="#073B32" stroke="#22C997" stroke-width="2"/><text x="615" y="418" text-anchor="middle" class="head">STOCK</text><text x="615" y="449" text-anchor="middle" class="body">confirmed daily candles</text><text x="615" y="475" text-anchor="middle" class="body">stocks · synced_at</text><text x="615" y="501" text-anchor="middle" class="body">Stock Outbox</text><text x="615" y="527" text-anchor="middle" class="body">Kiwoom integration</text><rect x="527" y="540" width="176" height="24" rx="12" fill="#0D594A"/><text x="615" y="557" text-anchor="middle" class="tiny" fill="#ECFFF8">transaction owner</text>
    <rect x="810" y="380" width="300" height="190" rx="24" fill="#102A43" stroke="#4DA3FF" stroke-width="2"/><text x="960" y="418" text-anchor="middle" class="head">PORTFOLIO</text><text x="960" y="449" text-anchor="middle" class="body">active holdings</text><text x="960" y="475" text-anchor="middle" class="body">portfolio_snapshots</text><text x="960" y="501" text-anchor="middle" class="body">daily profit · return rate</text><text x="960" y="527" text-anchor="middle" class="body">history read model</text><rect x="872" y="540" width="176" height="24" rx="12" fill="#173E64"/><text x="960" y="557" text-anchor="middle" class="tiny" fill="#EFF8FF">metric owner</text>
    <rect x="1155" y="380" width="390" height="190" rx="24" fill="#2D1B4E" stroke="#B794F4" stroke-width="2"/><text x="1350" y="418" text-anchor="middle" class="head">RANKING</text><text x="1350" y="449" text-anchor="middle" class="body">ranking_runs · snapshot · history</text><text x="1350" y="475" text-anchor="middle" class="body">idempotency records</text><text x="1350" y="501" text-anchor="middle" class="body">Ranking Outbox</text><text x="1350" y="527" text-anchor="middle" class="body">Redis TOP100 · latest-date</text><rect x="1243" y="540" width="214" height="24" rx="12" fill="#43256D"/><text x="1350" y="557" text-anchor="middle" class="tiny" fill="#FAF5FF">atomic finalize owner</text>
    <rect x="1590" y="380" width="145" height="190" rx="24" fill="#4A2B08" stroke="#FF9F43" stroke-width="2"/><text x="1662" y="418" text-anchor="middle" class="head">KAFKA</text><text x="1662" y="449" text-anchor="middle" class="tiny">at-least-once</text><text x="1662" y="475" text-anchor="middle" class="tiny">event ID</text><text x="1662" y="497" text-anchor="middle" class="tiny">deduplication</text>
  </g>

  <path d="M245 570V620H960V570" class="dash"/><text x="603" y="608" text-anchor="middle" class="tiny">OrderFilled updates holdings</text>
  <path d="M1110 475H1155" class="dash"/><text x="1132" y="461" text-anchor="middle" class="tiny">EOD</text>
  <path d="M1545 475H1590" class="dash"/>

  <text x="72" y="650" class="section">03 · FAILURE CONTAINMENT</text>
  <g filter="url(#soft)">
    <rect x="70" y="680" width="510" height="170" rx="22" fill="#132330" stroke="#5D7183" stroke-width="2"/><circle cx="106" cy="719" r="9" fill="#FF7A70"/><text x="132" y="726" class="head">DEPENDENT CHAIN STOPS</text><text x="98" y="763" class="body">• 선행 Trading Job 실패 → 종속 Job 미실행</text><text x="98" y="792" class="body">• 일봉 마감 실패 → 종가 예약 처리 미호출</text><text x="98" y="821" class="body">• EOD 미완료 → Ranking RPC 미호출</text>
    <rect x="645" y="680" width="510" height="170" rx="22" fill="#132330" stroke="#5D7183" stroke-width="2"/><circle cx="681" cy="719" r="9" fill="#F4C95D"/><text x="707" y="726" class="head">COMMITTED DATA STAYS</text><text x="673" y="763" class="body">• Ranking 실패가 Portfolio EOD를 rollback하지 않음</text><text x="673" y="792" class="body">• Stock Sync 실패가 당일 Ranking을 삭제하지 않음</text><text x="673" y="821" class="body">• 서비스별 transaction 경계 유지</text>
    <rect x="1220" y="680" width="515" height="170" rx="22" fill="#132330" stroke="#5D7183" stroke-width="2"/><circle cx="1256" cy="719" r="9" fill="#22C997"/><text x="1282" y="726" class="head">RESTART SAFELY</text><text x="1248" y="763" class="body">• 동일 거래일 JobInstance와 Step context 사용</text><text x="1248" y="792" class="body">• 상태 변경 RPC는 동일 멱등성 키 유지</text><text x="1248" y="821" class="body">• Outbox publisher와 consumer dedup으로 복구</text>
  </g>

  <text x="72" y="930" class="section">04 · USER-VISIBLE OUTCOMES</text>
  <g>
    <rect x="70" y="960" width="385" height="110" rx="20" fill="#241A1E" stroke="#FF7A70"/><text x="98" y="997" class="head">ORDER &amp; RESERVATION</text><text x="98" y="1026" class="body">전환 · 체결 · 만료 상태가 최신화됩니다.</text><text x="98" y="1051" class="tiny">source: Trading state + Outbox</text>
    <rect x="495" y="960" width="385" height="110" rx="20" fill="#102433" stroke="#4DA3FF"/><text x="523" y="997" class="head">PORTFOLIO HISTORY</text><text x="523" y="1026" class="body">일별 자산·손익·누적 수익률을 제공합니다.</text><text x="523" y="1051" class="tiny">source: portfolio_snapshots</text>
    <rect x="920" y="960" width="385" height="110" rx="20" fill="#211832" stroke="#B794F4"/><text x="948" y="997" class="head">TOP &amp; MY RANKING</text><text x="948" y="1026" class="body">마지막 완료 거래일의 순위를 제공합니다.</text><text x="948" y="1051" class="tiny">source: Ranking DB + Redis cache-aside</text>
    <rect x="1345" y="960" width="390" height="110" rx="20" fill="#0C2C27" stroke="#22C997"/><text x="1373" y="997" class="head">STOCK CATALOG</text><text x="1373" y="1026" class="body">최신 종목 이름·시장·상장 정보를 제공합니다.</text><text x="1373" y="1051" class="tiny">source: stocks · synced_at</text>
  </g>

  <rect x="70" y="1125" width="1660" height="1" fill="#294052"/><text x="70" y="1157" class="subtitle">Legend · gold solid = direct execution impact · slate dashed = downstream read/event impact</text>
</svg>
