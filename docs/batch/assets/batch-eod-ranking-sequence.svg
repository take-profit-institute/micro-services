<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1300" viewBox="0 0 1800 1300">
  <defs><linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071521"/><stop offset="1" stop-color="#10172B"/></linearGradient><marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#F4C95D"/></marker><marker id="r2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#91A4B7"/></marker><style>.t{font:700 38px Inter,Arial;fill:#F8FAFC}.s{font:500 17px Inter,Arial;fill:#91A4B7}.h{font:700 16px Inter,Arial;fill:#F8FAFC}.x{font:600 14px Inter,Arial;fill:#D5E2EC}.n{font:500 14px Inter,Arial;fill:#AFC0CF}.lane{stroke:#34495A;stroke-width:2;stroke-dasharray:7 8}.call{stroke:#F4C95D;stroke-width:2.5;marker-end:url(#a2)}.ret{stroke:#91A4B7;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#r2)}</style></defs>
  <rect width="1800" height="1220" rx="34" fill="url(#bg2)"/><text x="72" y="70" class="t">PORTFOLIO EOD → DAILY RANKING</text><text x="72" y="103" class="s">확정 종가와 현금을 결합한 스냅샷이 완료된 뒤에만 랭킹을 확정합니다.</text>
  <g transform="translate(55 145)">
    <g font-family="Inter,Arial" font-size="16" font-weight="700" text-anchor="middle"><rect width="230" height="66" rx="17" fill="#3A2F0B" stroke="#F4C95D" stroke-width="2"/><text x="115" y="40" fill="#FFF9DB">BATCH</text><rect x="300" width="250" height="66" rx="17" fill="#102A43" stroke="#4DA3FF" stroke-width="2"/><text x="425" y="40" fill="#EFF8FF">PORTFOLIO</text><rect x="630" width="230" height="66" rx="17" fill="#073B32" stroke="#22C997" stroke-width="2"/><text x="745" y="40" fill="#ECFFF8">STOCK</text><rect x="940" width="230" height="66" rx="17" fill="#4A2028" stroke="#FF7A70" stroke-width="2"/><text x="1055" y="40" fill="#FFF4F2">TRADING</text><rect x="1250" width="220" height="66" rx="17" fill="#263442" stroke="#94A3B8" stroke-width="2"/><text x="1360" y="31" fill="#F8FAFC">BATCH META</text><text x="1360" y="51" fill="#AFC0CF" font-size="13">same businessDate</text><rect x="1510" width="220" height="66" rx="17" fill="#2D1B4E" stroke="#B794F4" stroke-width="2"/><text x="1620" y="40" fill="#FAF5FF">RANKING</text></g>
    <path d="M115 66V965M425 66V965M745 66V965M1055 66V965M1360 66V965M1620 66V965" class="lane"/>
    <text x="10" y="125" class="h" fill="#4DA3FF">01 · LOAD HOLDERS</text><path d="M120 150H415" class="call"/><text x="268" y="139" text-anchor="middle" class="h">ListActiveHolders(page)</text><path d="M415 185H120" class="ret"/><text x="268" y="176" text-anchor="middle" class="x">user_id · positions · next token</text>
    <text x="10" y="245" class="h" fill="#22C997">02 · FREEZE PRICES</text><path d="M120 270H735" class="call"/><text x="430" y="259" text-anchor="middle" class="h">GetPreviousClose(code, D+1 00:00 KST) × symbol</text><path d="M735 305H120" class="ret"/><text x="430" y="296" text-anchor="middle" class="x">prev_close · prev_open_time</text>
    <text x="10" y="365" class="h" fill="#FF7A70">03 · LOAD CASH</text><path d="M120 390H1045" class="call"/><text x="585" y="379" text-anchor="middle" class="h">GetBalance(user_id) × user</text><path d="M1045 425H120" class="ret"/><text x="585" y="416" text-anchor="middle" class="x">available_cash + reserved_balance</text>
    <rect x="20" y="465" width="540" height="104" rx="18" fill="#13293A" stroke="#4DA3FF"/><text x="45" y="495" class="h">BATCH CALCULATION</text><text x="45" y="525" class="x">stock_value = Σ(quantity × previous_close)</text><text x="45" y="550" class="x">total_asset = cash + stock_value</text>
    <path d="M120 615H415" class="call"/><text x="268" y="604" text-anchor="middle" class="h">RecordDailySnapshot</text><text x="268" y="634" text-anchor="middle" class="n">date · assets · seed capital · idempotency key</text><path d="M415 670H120" class="ret"/><text x="268" y="661" text-anchor="middle" class="x">daily_profit · cumulative_return_rate</text>
    <path d="M120 735H1350" class="call"/><text x="735" y="724" text-anchor="middle" class="h">portfolioEodSnapshotJob = COMPLETED</text>
    <text x="10" y="795" class="h" fill="#B794F4">04 · FINALIZE RANKING</text><path d="M120 820H1350" class="call"/><text x="735" y="809" text-anchor="middle" class="h">same-date completion guard</text><path d="M1350 850H120" class="ret"/><text x="735" y="841" text-anchor="middle" class="x">COMPLETED only · otherwise stop before RPC</text><path d="M120 900H1610" class="call"/><text x="865" y="889" text-anchor="middle" class="h">FinalizeDailyRanking(date · deterministic key)</text><path d="M1610 935H425" class="call"/><text x="1018" y="924" text-anchor="middle" class="h">ListDailyPortfolioSnapshots(page)</text><path d="M415 965H1600" class="ret"/><text x="1008" y="956" text-anchor="middle" class="x">total_asset · cumulative_return_rate</text><path d="M1610 1005H120" class="ret"/><text x="865" y="996" text-anchor="middle" class="x">ranked_user_count</text>
  </g>
  <rect x="70" y="1230" width="1660" height="1" fill="#294052"/><text x="70" y="1265" class="s">Ownership · Portfolio stores EOD metrics. Ranking filters, sorts, stores ranking/outbox/idempotency, and refreshes Redis.</text>
</svg>
