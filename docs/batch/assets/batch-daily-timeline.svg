<svg preserveAspectRatio="xMidYMid meet" text-rendering="geometricPrecision" shape-rendering="geometricPrecision" xmlns="http://www.w3.org/2000/svg" width="3600" height="1240" viewBox="0 0 1800 620" role="img" aria-labelledby="title desc">
  <title id="title">Candle Batch daily timeline</title>
  <desc id="desc">KST 08:30 Trading reservation processing through 16:30 Stock synchronization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111D"/>
      <stop offset="0.55" stop-color="#0A1D2B"/>
      <stop offset="1" stop-color="#101629"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE38A"/>
      <stop offset="1" stop-color="#D7AD45"/>
    </linearGradient>
    <linearGradient id="trading" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B2731"/>
      <stop offset="1" stop-color="#351722"/>
    </linearGradient>
    <linearGradient id="portfolio" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123E66"/>
      <stop offset="1" stop-color="#0C253F"/>
    </linearGradient>
    <linearGradient id="ranking" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#432873"/>
      <stop offset="1" stop-color="#291843"/>
    </linearGradient>
    <linearGradient id="stock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#075345"/>
      <stop offset="1" stop-color="#052F2A"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#8CA0B3" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1800" height="620" rx="34" fill="url(#bg)"/>
  <rect width="1800" height="620" rx="34" fill="url(#grid)"/>
  <circle cx="140" cy="-20" r="230" fill="#F4C95D" opacity="0.055"/>
  <circle cx="1640" cy="620" r="300" fill="#8B5CF6" opacity="0.055"/>

  <text x="72" y="76" fill="#F7FAFC" font-family="Inter, Pretendard, sans-serif" font-size="34" font-weight="750">CANDLE · DAILY BATCH TIMELINE</text>
  <text x="72" y="112" fill="#91A4B7" font-family="Inter, Pretendard, sans-serif" font-size="18" letter-spacing="2">ASIA/SEOUL · WEEKDAY DEFAULT SCHEDULE</text>
  <rect x="1505" y="58" width="220" height="54" rx="27" fill="#F4C95D" fill-opacity="0.12" stroke="#F4C95D" stroke-opacity="0.75"/>
  <circle cx="1528" cy="85" r="7" fill="#F4C95D" filter="url(#glow)"/>
  <text x="1548" y="92" fill="#FFE38A" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="650">SINGLE INSTANCE</text>

  <path d="M120 315H1680" stroke="#344B60" stroke-width="5" stroke-linecap="round"/>
  <path d="M120 315H1680" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- 08:30 -->
  <g>
    <rect x="70" y="168" width="222" height="118" rx="20" fill="url(#trading)" stroke="#FF7A70" stroke-width="2"/>
    <text x="92" y="205" fill="#FFB2AA" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">08:30 · TRADING</text>
    <text x="92" y="239" fill="#FFF4F2" font-family="Inter, Pretendard, sans-serif" font-size="21" font-weight="700">PREV_CLOSE 예약</text>
    <text x="92" y="266" fill="#D8B7B5" font-family="Inter, Pretendard, sans-serif" font-size="14">PreviousClose Job</text>
  </g>
  <circle cx="181" cy="315" r="12" fill="#071521" stroke="#FF7A70" stroke-width="5"/>

  <!-- 09:00 -->
  <g>
    <rect x="309" y="344" width="222" height="118" rx="20" fill="url(#trading)" stroke="#FF7A70" stroke-width="2"/>
    <text x="331" y="381" fill="#FFB2AA" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">09:00 · TRADING</text>
    <text x="331" y="415" fill="#FFF4F2" font-family="Inter, Pretendard, sans-serif" font-size="21" font-weight="700">OPEN + LIMIT</text>
    <text x="331" y="442" fill="#D8B7B5" font-family="Inter, Pretendard, sans-serif" font-size="14">OpenLimit Job</text>
  </g>
  <circle cx="420" cy="315" r="12" fill="#071521" stroke="#FF7A70" stroke-width="5"/>

  <!-- 15:30 -->
  <g>
    <rect x="548" y="156" width="236" height="130" rx="20" fill="url(#trading)" stroke="#FF7A70" stroke-width="2"/>
    <text x="570" y="193" fill="#FFB2AA" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">15:30 · TRADING</text>
    <text x="570" y="227" fill="#FFF4F2" font-family="Inter, Pretendard, sans-serif" font-size="20" font-weight="700">미체결 만료</text>
    <text x="570" y="255" fill="#FFF4F2" font-family="Inter, Pretendard, sans-serif" font-size="17">→ stale 예약 정리</text>
  </g>
  <circle cx="666" cy="315" r="12" fill="#071521" stroke="#FF7A70" stroke-width="5"/>

  <!-- 15:40 -->
  <g>
    <rect x="801" y="344" width="236" height="130" rx="20" fill="url(#trading)" stroke="#FF7A70" stroke-width="2"/>
    <text x="823" y="381" fill="#FFB2AA" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">15:40 · CLOSE</text>
    <text x="823" y="415" fill="#FFF4F2" font-family="Inter, Pretendard, sans-serif" font-size="20" font-weight="700">일봉 · 종가 예약</text>
    <text x="823" y="443" fill="#FFF4F2" font-family="Inter, Pretendard, sans-serif" font-size="17">→ 잔여 예약 만료</text>
  </g>
  <circle cx="919" cy="315" r="12" fill="#071521" stroke="#FF7A70" stroke-width="5"/>

  <!-- 16:00 -->
  <g>
    <rect x="1054" y="168" width="222" height="118" rx="20" fill="url(#portfolio)" stroke="#4DA3FF" stroke-width="2"/>
    <text x="1076" y="205" fill="#9CCBFF" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">16:00 · PORTFOLIO</text>
    <text x="1076" y="239" fill="#EFF8FF" font-family="Inter, Pretendard, sans-serif" font-size="21" font-weight="700">EOD SNAPSHOT</text>
    <text x="1076" y="266" fill="#B9D5ED" font-family="Inter, Pretendard, sans-serif" font-size="14">Asset aggregation</text>
  </g>
  <circle cx="1165" cy="315" r="12" fill="#071521" stroke="#4DA3FF" stroke-width="5"/>

  <!-- 16:20 -->
  <g>
    <rect x="1293" y="344" width="222" height="118" rx="20" fill="url(#ranking)" stroke="#B794F4" stroke-width="2"/>
    <text x="1315" y="381" fill="#D7C1FF" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">16:20 · RANKING</text>
    <text x="1315" y="415" fill="#FAF5FF" font-family="Inter, Pretendard, sans-serif" font-size="21" font-weight="700">DAILY FINALIZE</text>
    <text x="1315" y="442" fill="#D8CBEA" font-family="Inter, Pretendard, sans-serif" font-size="14">Requires EOD completed</text>
  </g>
  <circle cx="1404" cy="315" r="12" fill="#071521" stroke="#B794F4" stroke-width="5"/>

  <!-- 16:30 -->
  <g>
    <rect x="1532" y="168" width="210" height="118" rx="20" fill="url(#stock)" stroke="#22C997" stroke-width="2"/>
    <text x="1554" y="205" fill="#8EF0D1" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">16:30 · STOCK</text>
    <text x="1554" y="239" fill="#ECFFF8" font-family="Inter, Pretendard, sans-serif" font-size="21" font-weight="700">MASTER SYNC</text>
    <text x="1554" y="266" fill="#ACD8CA" font-family="Inter, Pretendard, sans-serif" font-size="14">KOSPI · KOSDAQ</text>
  </g>
  <circle cx="1637" cy="315" r="12" fill="#071521" stroke="#22C997" stroke-width="5"/>

  <text x="72" y="560" fill="#6F8497" font-family="Inter, Pretendard, sans-serif" font-size="15">Solid line · chronological order     │     paired jobs · next job starts only after previous COMPLETED</text>
</svg>
