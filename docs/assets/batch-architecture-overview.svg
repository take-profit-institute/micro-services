<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-labelledby="title desc">
  <title id="title">Candle Batch system context</title>
  <desc id="desc">Automatic and manual entry points converge on Spring Batch and call Trading, Stock, Portfolio and Ranking services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06111D"/><stop offset="1" stop-color="#12182B"/></linearGradient>
    <linearGradient id="batch" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#51410F"/><stop offset="1" stop-color="#292109"/></linearGradient>
    <linearGradient id="entry" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#253447"/><stop offset="1" stop-color="#151E2A"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-opacity="0.4"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#71869A"/></marker>
    <marker id="arrowGold" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="18" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#F4C95D"/></marker>
    <marker id="arrowTrading" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#FF7A70"/></marker>
    <marker id="arrowStock" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#22C997"/></marker>
    <marker id="arrowPortfolio" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#4DA3FF"/></marker>
    <marker id="arrowRanking" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto"><path d="M0 0L18 9L0 18Z" fill="#B794F4"/></marker>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#8CA0B3" stroke-opacity="0.045"/></pattern>
  </defs>
  <rect width="1800" height="1080" rx="34" fill="url(#bg)"/><rect width="1800" height="1080" rx="34" fill="url(#grid)"/>
  <text x="72" y="76" fill="#F7FAFC" font-family="Inter, Pretendard, sans-serif" font-size="34" font-weight="750">CANDLE · BATCH SYSTEM CONTEXT</text>
  <text x="72" y="112" fill="#91A4B7" font-family="Inter, Pretendard, sans-serif" font-size="18" letter-spacing="2">CONTROL PLANE → DOMAIN SERVICES → OWNED DATA</text>

  <!-- entry -->
  <g filter="url(#shadow)"><rect x="70" y="205" width="285" height="118" rx="22" fill="url(#entry)" stroke="#7F93A8"/><text x="100" y="248" fill="#DCE7F0" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">AUTOMATIC</text><text x="100" y="282" fill="#FFFFFF" font-family="Inter, Pretendard, sans-serif" font-size="24" font-weight="700">KST Scheduler</text><text x="100" y="307" fill="#91A4B7" font-family="Inter, Pretendard, sans-serif" font-size="14">weekday cron · disabled by default</text></g>
  <g filter="url(#shadow)"><rect x="70" y="365" width="285" height="118" rx="22" fill="url(#entry)" stroke="#7F93A8"/><text x="100" y="408" fill="#DCE7F0" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">MANUAL</text><text x="100" y="442" fill="#FFFFFF" font-family="Inter, Pretendard, sans-serif" font-size="24" font-weight="700">Batch Control gRPC</text><text x="100" y="467" fill="#91A4B7" font-family="Inter, Pretendard, sans-serif" font-size="14">TriggerJob · :50062</text></g>

  <!-- batch core -->
  <g filter="url(#shadow)">
    <rect x="445" y="175" width="435" height="390" rx="30" fill="url(#batch)" stroke="#F4C95D" stroke-width="2.5"/>
    <rect x="477" y="209" width="205" height="36" rx="18" fill="#F4C95D" fill-opacity="0.14"/>
    <circle cx="500" cy="227" r="6" fill="#F4C95D" filter="url(#glow)"/>
    <text x="518" y="233" fill="#FFE38A" font-family="Inter, Pretendard, sans-serif" font-size="16" font-weight="700">SINGLE INSTANCE</text>
    <text x="477" y="290" fill="#FFF9DB" font-family="Inter, Pretendard, sans-serif" font-size="30" font-weight="750">Candle Batch</text>
    <text x="477" y="324" fill="#C9B974" font-family="Inter, Pretendard, sans-serif" font-size="16">orchestration · retry · restart</text>
    <rect x="477" y="360" width="370" height="72" rx="16" fill="#1C1D18" stroke="#A88D35"/>
    <text x="502" y="390" fill="#F7E9AF" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">JobOperator + Job Registry</text>
    <text x="502" y="416" fill="#AFA57D" font-family="Inter, Pretendard, sans-serif" font-size="14">Trading · EOD · Ranking · Stock</text>
    <rect x="477" y="453" width="370" height="78" rx="16" fill="#242B32" stroke="#8292A2"/>
    <text x="502" y="484" fill="#E7EDF3" font-family="Inter, Pretendard, sans-serif" font-size="18" font-weight="700">Spring Batch Metadata</text>
    <text x="502" y="510" fill="#9BA9B7" font-family="Inter, Pretendard, sans-serif" font-size="14">JobInstance · Step · ExecutionContext</text>
  </g>

  <path d="M355 264H445" stroke="#F4C95D" stroke-width="3" marker-end="url(#arrowGold)"/><path d="M355 424H445" stroke="#F4C95D" stroke-width="3" marker-end="url(#arrowGold)"/>

  <!-- services -->
  <g filter="url(#shadow)"><rect x="1010" y="160" width="300" height="126" rx="22" fill="#4A2028" stroke="#FF7A70" stroke-width="2"/><text x="1040" y="202" fill="#FFB2AA" font-family="Inter, Pretendard, sans-serif" font-size="17" font-weight="700">TRADING · :50054</text><text x="1040" y="237" fill="#FFF4F2" font-family="Inter, Pretendard, sans-serif" font-size="23" font-weight="700">예약 · 주문 · 계좌</text><text x="1040" y="263" fill="#D8B7B5" font-family="Inter, Pretendard, sans-serif" font-size="14">state change + Outbox</text></g>
  <g filter="url(#shadow)"><rect x="1010" y="320" width="300" height="126" rx="22" fill="#073B32" stroke="#22C997" stroke-width="2"/><text x="1040" y="362" fill="#8EF0D1" font-family="Inter, Pretendard, sans-serif" font-size="17" font-weight="700">STOCK · :50060</text><text x="1040" y="397" fill="#ECFFF8" font-family="Inter, Pretendard, sans-serif" font-size="23" font-weight="700">일봉 · 종목 마스터</text><text x="1040" y="423" fill="#ACD8CA" font-family="Inter, Pretendard, sans-serif" font-size="14">Kiwoom integration</text></g>
  <g filter="url(#shadow)"><rect x="1010" y="480" width="300" height="126" rx="22" fill="#102A43" stroke="#4DA3FF" stroke-width="2"/><text x="1040" y="522" fill="#9CCBFF" font-family="Inter, Pretendard, sans-serif" font-size="17" font-weight="700">PORTFOLIO · :50055</text><text x="1040" y="557" fill="#EFF8FF" font-family="Inter, Pretendard, sans-serif" font-size="23" font-weight="700">보유자 · EOD</text><text x="1040" y="583" fill="#B9D5ED" font-family="Inter, Pretendard, sans-serif" font-size="14">snapshot + return rate</text></g>
  <g filter="url(#shadow)"><rect x="1010" y="640" width="300" height="126" rx="22" fill="#2D1B4E" stroke="#B794F4" stroke-width="2"/><text x="1040" y="682" fill="#D7C1FF" font-family="Inter, Pretendard, sans-serif" font-size="17" font-weight="700">RANKING · :50056</text><text x="1040" y="717" fill="#FAF5FF" font-family="Inter, Pretendard, sans-serif" font-size="23" font-weight="700">일별 순위 · 캐시</text><text x="1040" y="743" fill="#D8CBEA" font-family="Inter, Pretendard, sans-serif" font-size="14">ranking + idempotency + Outbox</text></g>

  <path d="M880 300C940 300 940 223 1010 223" fill="none" stroke="#FF7A70" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowTrading)"/>
  <path d="M880 345C950 345 950 383 1010 383" fill="none" stroke="#22C997" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowStock)"/>
  <path d="M880 405C950 405 950 543 1010 543" fill="none" stroke="#4DA3FF" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowPortfolio)"/>
  <path d="M880 465C950 465 950 703 1010 703" fill="none" stroke="#B794F4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowRanking)"/>

  <!-- external and event bus -->
  <g filter="url(#shadow)"><rect x="1440" y="320" width="285" height="126" rx="22" fill="#17212B" stroke="#8798A9"/><text x="1470" y="362" fill="#CAD5DF" font-family="Inter, Pretendard, sans-serif" font-size="17" font-weight="700">EXTERNAL MARKET</text><text x="1470" y="397" fill="#FFFFFF" font-family="Inter, Pretendard, sans-serif" font-size="24" font-weight="700">Kiwoom OpenAPI</text><text x="1470" y="423" fill="#91A4B7" font-family="Inter, Pretendard, sans-serif" font-size="14">credentials · outbound network</text></g>
  <path d="M1310 383H1440" stroke="#22C997" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="1410" y="585" width="315" height="126" rx="22" fill="#4A2B08" stroke="#FF9F43" stroke-width="2"/><text x="1440" y="627" fill="#FFC98F" font-family="Inter, Pretendard, sans-serif" font-size="17" font-weight="700">ASYNC EVENT PLANE</text><text x="1440" y="662" fill="#FFF4E6" font-family="Inter, Pretendard, sans-serif" font-size="25" font-weight="700">Kafka · Outbox</text><text x="1440" y="688" fill="#D8B58C" font-family="Inter, Pretendard, sans-serif" font-size="14">at-least-once delivery</text></g>
  <path d="M1310 223H1355M1310 383H1355M1310 543H1355M1310 703H1355M1355 223V703" fill="none" stroke="#FF9F43" stroke-width="2" stroke-dasharray="8 7"/>
  <path d="M1355 648H1410" fill="none" stroke="#FF9F43" stroke-width="2" stroke-dasharray="8 7" marker-end="url(#arrow)"/>

  <!-- databases -->
  <text x="72" y="870" fill="#91A4B7" font-family="Inter, Pretendard, sans-serif" font-size="16" font-weight="700" letter-spacing="2">SERVICE-OWNED PERSISTENCE</text>
  <g filter="url(#shadow)"><rect x="70" y="900" width="330" height="105" rx="20" fill="#263442" stroke="#94A3B8"/><text x="100" y="942" fill="#F8FAFC" font-family="Inter, Pretendard, sans-serif" font-size="20" font-weight="700">Trading schemas</text><text x="100" y="974" fill="#B8C4CF" font-family="Inter, Pretendard, sans-serif" font-size="15">account · order · reservation</text></g>
  <g filter="url(#shadow)"><rect x="440" y="900" width="300" height="105" rx="20" fill="#263442" stroke="#94A3B8"/><text x="470" y="942" fill="#F8FAFC" font-family="Inter, Pretendard, sans-serif" font-size="20" font-weight="700">stock schema</text><text x="470" y="974" fill="#B8C4CF" font-family="Inter, Pretendard, sans-serif" font-size="15">stocks · candles · outbox</text></g>
  <g filter="url(#shadow)"><rect x="780" y="900" width="330" height="105" rx="20" fill="#263442" stroke="#94A3B8"/><text x="810" y="942" fill="#F8FAFC" font-family="Inter, Pretendard, sans-serif" font-size="20" font-weight="700">portfolio schema</text><text x="810" y="974" fill="#B8C4CF" font-family="Inter, Pretendard, sans-serif" font-size="15">holdings · snapshots</text></g>
  <g filter="url(#shadow)"><rect x="1150" y="900" width="330" height="105" rx="20" fill="#263442" stroke="#94A3B8"/><text x="1180" y="942" fill="#F8FAFC" font-family="Inter, Pretendard, sans-serif" font-size="20" font-weight="700">ranking schema</text><text x="1180" y="974" fill="#B8C4CF" font-family="Inter, Pretendard, sans-serif" font-size="15">history · runs · idempotency</text></g>
  <g filter="url(#shadow)"><rect x="1520" y="900" width="205" height="105" rx="20" fill="#263442" stroke="#94A3B8"/><text x="1550" y="942" fill="#F8FAFC" font-family="Inter, Pretendard, sans-serif" font-size="20" font-weight="700">Redis</text><text x="1550" y="974" fill="#B8C4CF" font-family="Inter, Pretendard, sans-serif" font-size="15">ranking cache</text></g>

  <path d="M1250 766C1450 820 1620 810 1620 900" fill="none" stroke="#52677A" stroke-width="1.8" stroke-dasharray="5 6"/>
</svg>
