# 로컬 개발용 백킹 서비스 (AWS 없이 전 서비스 로컬 실행)
# 기본: timescaledb / redis / bff / gateway
#
#   docker compose -f docker-compose-lean.yml up -d             # lean backing + bff + gateway
# Spring을 호스트에서 실행: ./gradlew :services:user-service:bootRun
name: candle-local-v2-lean

services:
  # market 전용 시계열 DB (운영의 TimescaleDB StatefulSet 대용)
  timescaledb:
    image: timescale/timescaledb:2.17.1-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: market
    ports: ["5433:5432"]
    volumes:
      - tsdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: ["6379:6379"]

  # ── 옵션: bff 컨테이너 (소스 대신 이미지로) ──
  # webapp repo에서 빌드/푸시한 이미지를 가져다 씀. 안 쓰면 webapp repo에서 직접 실행.
  bff:
    image: ${BFF_IMAGE:-yyubin/candle-bff:dev}
    environment:
      PORT: "8080" # bff는 PORT 사용(기본 4000)
      HOST: "0.0.0.0"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      REDIS_URL: redis://redis:6379
      # 실제 마이크로서비스로 gRPC 라우팅 (mock 아님)
      DATA_SOURCE: grpc
      # gRPC 서비스는 호스트에서 로컬 실행 (50051~50060)
      GRPC_AUTH_ADDR:         host.docker.internal:50051
      GRPC_USER_ADDR:         host.docker.internal:50052
      GRPC_MARKET_ADDR:       host.docker.internal:50063
      GRPC_ACCOUNT_ADDR:      host.docker.internal:50054
      GRPC_PORTFOLIO_ADDR:    host.docker.internal:50055
      GRPC_RANKING_ADDR:      host.docker.internal:50056
      GRPC_NOTIFICATION_ADDR: host.docker.internal:50057
      GRPC_MISSION_ADDR:      host.docker.internal:50058
      GRPC_LEARN_ADDR:        host.docker.internal:50059
      GRPC_STOCK_ADDR:        host.docker.internal:50060
    ports: ["8080:8080"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      redis:
        condition: service_started

  # ── 개발용 API Gateway ──────────────────────────────────────────────
  # JWT 검증 → X-Account-Id 헤더 주입 → 라우팅 (프로덕션 API Gateway 역할 대체)
  #
  gateway:
    image: ${GATEWAY_IMAGE:-yyubin/candle-gateway:dev}
    environment:
      GATEWAY_PORT: "8000"
      AUTH_JWT_HMAC_SECRET: ${AUTH_JWT_HMAC_SECRET:-local-dev-secret-change-me}
      # auth-service 주소: 'services' 프로파일 사용 시 http://auth-service:8081
      GATEWAY_AUTH_URI: ${GATEWAY_AUTH_URI:-http://host.docker.internal:8081}
      GATEWAY_BFF_URI: ${GATEWAY_BFF_URI:-http://bff:8080}
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports: ["8000:8000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      bff:
        condition: service_started

volumes:
  pgdata:
  tsdata:
  rpdata:
