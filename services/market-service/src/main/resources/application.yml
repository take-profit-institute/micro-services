spring:
  application:
    name: market-service
  config:
    import: optional:file:.env[.properties]
  grpc:
    server:
      port: ${MARKET_GRPC_PORT:50063}
    client:
      channel:
        stock-service:
          target: ${STOCK_SERVICE_GRPC_ADDRESS:static://localhost:50060}
  datasource:
    url: jdbc:postgresql://localhost:5433/market
    username: ${POSTGRES_USER:candle}
    password: ${POSTGRES_PASSWORD:candle}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    locations: classpath:migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # 부팅마다 새 그룹 + earliest → 압축 토픽 replay 로 활성 구독 집합 자가 복구
      group-id: ${MARKET_WISHLIST_SUB_GROUP:market-wishlist-sub}-${random.uuid}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: ${MARKET_REDIS_CONNECT_TIMEOUT:1s}
      timeout: ${MARKET_REDIS_TIMEOUT:1s}

server:
  port: 8083
management:
  health:
    redis:
      enabled: ${MARKET_REDIS_HEALTH_ENABLED:false}
market:
  quote:
    channel: ${MARKET_QUOTE_CHANNEL:market:quotes}
  price:
    topic: ${MARKET_PRICE_TOPIC:market.price.v1}
  order-book:
    topic: ${MARKET_ORDER_BOOK_TOPIC:market.order-book.v1}
  ws:
    supervise-interval-ms: ${MARKET_WS_SUPERVISE_INTERVAL_MS:30000}
    force-connect: ${MARKET_WS_FORCE_CONNECT:false}
    # 구독은 wishlist Kafka 이벤트 + viewer 수요로 채워진다. 시드는 로컬 개발용(기본 비어있음).
    seed-symbols: ${MARKET_WS_SEED_SYMBOLS:}
    # 뷰어 이탈 후 구독 해제 유예(상세 새로고침 플래핑 방지)
    viewer-grace-ms: ${MARKET_WS_VIEWER_GRACE_MS:5000}
    # 키움 grp_no 그룹당 실시간 등록 심볼 상한(정확한 한도는 키움 문서 확인 후 조정)
    max-symbols-per-group: ${MARKET_WS_MAX_SYMBOLS_PER_GROUP:100}
kiwoom:
  base-url: ${KIWOOM_BASE_URL:https://api.kiwoom.com}
  app-key: ${KIWOOM_APP_KEY}
  secret-key: ${KIWOOM_SECRET_KEY}
  connect-timeout-ms: ${KIWOOM_CONNECT_TIMEOUT_MS:3000}
  response-timeout-ms: ${KIWOOM_RESPONSE_TIMEOUT_MS:5000}
  read-timeout-ms: ${KIWOOM_READ_TIMEOUT_MS:5000}
  write-timeout-ms: ${KIWOOM_WRITE_TIMEOUT_MS:5000}
  token-cache-ttl: ${KIWOOM_TOKEN_CACHE_TTL:PT50M}
