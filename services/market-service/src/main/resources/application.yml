spring:
  application:
    name: market-service
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5433/market
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
    url: ${MARKET_DB_URL:jdbc:postgresql://localhost:5432/candle_market}
    username: ${MARKET_DB_USERNAME:candle}
    password: ${MARKET_DB_PASSWORD:candle}

server:
  port: 8083
kiwoom:
  base-url: ${KIWOOM_BASE_URL:https://api.kiwoom.com}
  app-key: ${KIWOOM_APP_KEY}
  secret-key: ${KIWOOM_SECRET_KEY}
  connect-timeout-ms: ${KIWOOM_CONNECT_TIMEOUT_MS:3000}
  response-timeout-ms: ${KIWOOM_RESPONSE_TIMEOUT_MS:5000}
  read-timeout-ms: ${KIWOOM_READ_TIMEOUT_MS:5000}
  write-timeout-ms: ${KIWOOM_WRITE_TIMEOUT_MS:5000}
  token-cache-ttl: ${KIWOOM_TOKEN_CACHE_TTL:PT50M}
