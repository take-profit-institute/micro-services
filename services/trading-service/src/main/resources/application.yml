spring:
  application:
    name: trading-service
  grpc:
    server:
      port: ${TRADING_GRPC_PORT:50054}
  datasource:
    url: ${TRADING_DB_URL:jdbc:postgresql://localhost:5432/candle_trading}
    username: ${TRADING_DB_USERNAME:candle}
    password: ${TRADING_DB_PASSWORD:candle}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
server:
  port: ${TRADING_SERVER_PORT:8084}

trading:
  idempotency:
    default-ttl: ${TRADING_IDEMPOTENCY_TTL:P1D}
