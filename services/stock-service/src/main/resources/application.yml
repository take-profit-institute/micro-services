spring:
  application:
    name: stock-service
  grpc:
    server:
      port: ${STOCK_GRPC_PORT:50060}
  datasource:
    url: ${STOCK_DB_URL:jdbc:postgresql://localhost:5432/candle?currentSchema=stock,public}
    username: ${STOCK_DB_USERNAME:candle}
    password: ${STOCK_DB_PASSWORD:candle}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${STOCK_SERVER_PORT:8091}

stock:
  outbox:
    publish-interval-ms: ${STOCK_OUTBOX_PUBLISH_INTERVAL_MS:5000}

# 키움 OpenAPI (종목 기준정보 fallback/동기화). 키가 없으면 fallback은 비활성(NOT_FOUND 반환).
kiwoom:
  base-url: ${KIWOOM_BASE_URL:https://api.kiwoom.com}
  app-key: ${KIWOOM_APP_KEY:}
  app-secret: ${KIWOOM_APP_SECRET:}
  # 상세 조회 시 DB 데이터가 이 기간보다 오래되면 키움에서 재조회한다.
  staleness: ${KIWOOM_STALENESS:P7D}
  chart-path: ${KIWOOM_CHART_PATH:/api/dostk/chart}
  # 외부 호출 timeout. 차트 첫 페이지는 응답이 커서 read timeout 을 넉넉히 잡는다.
  connect-timeout: ${KIWOOM_CONNECT_TIMEOUT:5s}
  read-timeout: ${KIWOOM_READ_TIMEOUT:40s}
