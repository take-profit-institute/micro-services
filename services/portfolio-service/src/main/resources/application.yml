spring:
  application:
    name: portfolio-service
  grpc:
    server:
      port: ${PORTFOLIO_GRPC_PORT:50055}
    client:
      # Spring Boot 4.1 spring-boot-grpc-client 규격: `channel`(단수) + `target`.
      channel:
        market-service:
          target: ${MARKET_SERVICE_GRPC_ADDRESS:static://localhost:50063}
        trading-service:
          target: ${TRADING_SERVICE_GRPC_ADDRESS:static://localhost:50054}
  datasource:
    url: ${PORTFOLIO_DB_URL:jdbc:postgresql://localhost:5432/candle?currentSchema=portfolio,public}
    username: ${PORTFOLIO_DB_USERNAME:candle}
    password: ${PORTFOLIO_DB_PASSWORD:candle}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORTFOLIO_SERVER_PORT:8085}
