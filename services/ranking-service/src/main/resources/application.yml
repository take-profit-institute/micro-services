spring:
  application:
    name: ranking-service
  grpc:
    server:
      port: ${RANKING_GRPC_PORT:50056}
  datasource:
    url: ${RANKING_DB_URL:jdbc:postgresql://localhost:5432/candle_ranking}
    username: ${RANKING_DB_USERNAME:candle}
    password: ${RANKING_DB_PASSWORD:candle}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:migration
  data:
    redis:
      host: ${RANKING_REDIS_HOST:localhost}
      port: ${RANKING_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ranking-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

server:
  port: ${RANKING_SERVER_PORT:8086}
