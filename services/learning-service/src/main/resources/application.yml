spring:
  application:
    name: learning-service
  grpc:
    server:
      port: ${LEARNING_GRPC_PORT:50059}
  datasource:
    url: ${LEARNING_DB_URL:jdbc:postgresql://localhost:5432/candle_learning?stringtype=unspecified}
    username: ${LEARNING_DB_USERNAME:candle}
    password: ${LEARNING_DB_PASSWORD:candle}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: learning
  flyway:
    locations: classpath:migration
    default-schema: learning
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
server:
  port: ${LEARNING_SERVER_PORT:8088}
learning:
  outbox:
    publish-interval-ms: ${LEARNING_OUTBOX_PUBLISH_INTERVAL_MS:5000}