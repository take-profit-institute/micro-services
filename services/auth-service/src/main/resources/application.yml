spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/candle_auth}
    username: ${AUTH_DB_USERNAME:candle}
    password: ${AUTH_DB_PASSWORD:candle}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:migration

server:
  port: ${AUTH_SERVER_PORT:8081}

auth:
  google:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:}
  jwt:
    issuer: ${AUTH_JWT_ISSUER:candle-auth}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    hmac-secret: ${AUTH_JWT_HMAC_SECRET:change-me-in-production-change-me-in-production}
  cookies:
    domain: ${AUTH_COOKIE_DOMAIN:}
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
