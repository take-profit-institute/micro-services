spring:
  application:
    name: auth-service
  grpc:
    server:
      port: ${AUTH_GRPC_PORT:50051}
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/candle_auth}
    username: ${AUTH_DB_USERNAME:candle}
    password: ${AUTH_DB_PASSWORD:candle}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${AUTH_SERVER_PORT:8081}

auth:
  google:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:}
    # 요청이 redirect_uri를 override할 때 허용할 목록(쉼표 구분). 네이티브 브릿지 등. 기본 redirect-uri는 자동 허용.
    allowed-redirect-uris: ${GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS:}
  kakao:
    client-id: ${KAKAO_OAUTH_CLIENT_ID:}
    client-secret: ${KAKAO_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_OAUTH_REDIRECT_URI:}
    allowed-redirect-uris: ${KAKAO_OAUTH_ALLOWED_REDIRECT_URIS:}
  naver:
    client-id: ${NAVER_OAUTH_CLIENT_ID:}
    client-secret: ${NAVER_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${NAVER_OAUTH_REDIRECT_URI:}
    allowed-redirect-uris: ${NAVER_OAUTH_ALLOWED_REDIRECT_URIS:}
  jwt:
    issuer: ${AUTH_JWT_ISSUER:candle-auth}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    hmac-secret: ${AUTH_JWT_HMAC_SECRET:change-me-in-production-change-me-in-production}
  cookies:
    domain: ${AUTH_COOKIE_DOMAIN:}
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
  outbox:
    publish-interval-ms: ${AUTH_OUTBOX_PUBLISH_INTERVAL_MS:5000}
