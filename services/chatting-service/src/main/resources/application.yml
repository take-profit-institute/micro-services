spring:
  application:
    name: chatting-service
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${CHAT_SERVER_PORT:8090}

chat:
  jwt:
    # auth-service JWKS(공개키)로 RS256 서명 검증(핸드셰이크 자체 검증). 대칭키 공유 폐지.
    jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:8081/.well-known/jwks.json}
    # auth-service의 AUTH_JWT_ISSUER와 동일해야 함(불일치 시 핸드셰이크 거부).
    issuer: ${AUTH_JWT_ISSUER:http://localhost:8081}
    # auth-service의 AUTH_JWT_AUDIENCE와 동일. 비우면 audience 검증 생략.
    audience: ${AUTH_JWT_AUDIENCE:candle-api}
  room:
    capacity: ${CHAT_ROOM_CAPACITY:500}
    # presence 멤버가 heartbeat 없이 생존하는 시간. 경과 시 정리되어 비정상 종료로 새는 인원이 자가치유된다.
    # heartbeat 2~3회 누락까지 허용하도록 heartbeat의 약 3배로 잡는다. ISO-8601 Duration.
    presence-ttl: ${CHAT_PRESENCE_TTL:PT1M30S}
    # 커넥션이 자신의 presence(ZSET score)를 갱신하는 주기.
    heartbeat: ${CHAT_HEARTBEAT:PT30S}
  cors:
    # 웹앱 origin(dev Next 3000 / 게이트웨이 8000 / vercel 프리뷰 / Capacitor 셸).
    allowed-origin-patterns: ${CHAT_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8000,https://webapp-webapp.vercel.app,https://webapp-webapp-*.vercel.app,capacitor://localhost}

management:
  endpoints:
    web:
      exposure:
        include: health
