syntax = "proto3";

package candle.portfolio.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.proto.portfolio.v1";

message PortfolioSummary { string user_id = 1; int64 total_asset = 2; int64 total_profit = 3; string total_return_rate = 4; }
message GetPortfolioSummaryRequest { string user_id = 1; }
message GetPortfolioSummaryResponse { PortfolioSummary summary = 1; }

service PortfolioService {
  rpc GetPortfolioSummary(GetPortfolioSummaryRequest) returns (GetPortfolioSummaryResponse);
}
