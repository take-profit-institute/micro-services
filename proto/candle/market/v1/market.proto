syntax = "proto3";

package candle.market.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.proto.market.v1";

import "candle/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

message Stock { string symbol = 1; string name = 2; string market = 3; }
message Quote { string symbol = 1; int64 price = 2; int64 change = 3; google.protobuf.Timestamp quoted_at = 4; }
message SearchStocksRequest { string query = 1; string market = 2; candle.common.v1.PageRequest page = 3; }
message SearchStocksResponse { repeated Stock stocks = 1; candle.common.v1.PageResponse page = 2; }
message GetQuoteRequest { string symbol = 1; }
message GetQuoteResponse { Quote quote = 1; }
message BatchQuotesRequest { repeated string symbols = 1; }
message BatchQuotesResponse { repeated Quote quotes = 1; }

// 당일 실시간 시세 그래프의 초기 스냅샷. 키움 주식틱차트(ka10079)를 조회해 오늘치 틱을 돌려준다.
// 장마감이어도 오늘 그래프를 그릴 수 있게 REST 로 당겨오는 경로다. 라이브 갱신은 WS(Redis)로 별도.
message IntradayTick {
  int64 price = 1;                       // 체결가(원)
  google.protobuf.Timestamp ts = 2;      // 체결시각
}
message GetIntradayTicksRequest {
  string symbol = 1;
  int32 limit = 2;                       // 최근 N개(0 이면 서버 기본값)
}
message GetIntradayTicksResponse {
  string symbol = 1;
  repeated IntradayTick ticks = 2;       // 오래된 -> 최신
}

// 종목 상세를 보는 뷰어에게 라이브 tick 을 팬아웃한다. 스냅샷용 Quote 와 달리 5% 판정에 쓰는
// 시가(open_price)까지 싣는다. 스트림이 열리면 구독 수요(viewer)가 잡히고, 닫히면 해제된다.
message LiveQuote {
  string symbol = 1;
  int64 price = 2;                       // 현재가(원)
  int64 change = 3;                      // 전일 대비
  double change_rate = 4;                // 등락률 %
  int64 open_price = 5;                  // 오늘 시가(원)
  int64 trading_volume = 6;              // 누적 거래량
  string price_change_sign = 7;          // 키움 부호코드
  google.protobuf.Timestamp ts = 8;      // 체결시각
}
// 심볼당 스트림 1개 = 멀티플렉스 단위. BFF 가 브라우저 뷰어를 자기 쪽에서 ref-count 하고,
// 심볼별 뷰어 0→1 에 이 스트림을 열고 1→0 에 닫는다. 같은 심볼을 N 명이 봐도 upstream 은 1개.
message StreamQuotesRequest {
  string symbol = 1;
}

// 거래일/장 운영 상태. 주말·공휴일·정규장 시간(09:00~15:30 KST)을 모두 반영한
// 권위 소스다. trading(즉시 주문 거래시간 검증)과 BFF(장마감 예약 전환)가 이 값을
// 단일 소스로 사용한다. 휴장일은 batch가 채우는 market_holidays 테이블이 소유한다.
message GetMarketStatusRequest {}
message GetMarketStatusResponse {
  bool open = 1;         // 지금 정규장 체결 가능 시간인가 (거래일 && 09:00~15:30 KST)
  bool trading_day = 2;  // 오늘이 거래일인가 (주말·휴장일 제외)
  string session = 3;    // "OPEN" | "CLOSED"
}

// 임의 날짜의 거래일 여부. 예약 주문의 실행 예정일(scheduled_date)이 주말·휴장일이
// 아닌지 검증하는 데 쓴다. 판정은 GetMarketStatus와 동일한 권위 소스(MarketSession)다.
message IsTradingDayRequest {
  string date = 1;  // "YYYY-MM-DD" (KST 기준 civil date)
}
message IsTradingDayResponse {
  bool trading_day = 1;  // 주말·휴장일이 아니면 true
}

service MarketService {
  rpc SearchStocks(SearchStocksRequest) returns (SearchStocksResponse);
  rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse);
  rpc BatchQuotes(BatchQuotesRequest) returns (BatchQuotesResponse);
  rpc GetIntradayTicks(GetIntradayTicksRequest) returns (GetIntradayTicksResponse);
  rpc StreamQuotes(StreamQuotesRequest) returns (stream LiveQuote);
  rpc GetMarketStatus(GetMarketStatusRequest) returns (GetMarketStatusResponse);
  rpc IsTradingDay(IsTradingDayRequest) returns (IsTradingDayResponse);
}
