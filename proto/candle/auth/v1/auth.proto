syntax = "proto3";

package candle.auth.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.proto.auth.v1";

message Provider {
  string name = 1;
  string authorization_url = 2;
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated Provider providers = 1;
}

message AuthUser {
  string user_id = 1;
  string email = 2;
  string provider = 3;
  string provider_subject = 4;
}

message GetMeRequest {
  string user_id = 1;
}

message GetMeResponse {
  AuthUser user = 1;
}

message AdminLoginRequest {
  string username = 1;
  string password = 2;
}

message AdminLoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;          // access token TTL (seconds)
  int64 refresh_expires_in = 4;  // refresh token TTL (seconds)
  string admin_id = 5;
  string username = 6;
  string display_name = 7;
  string role = 8;               // ADMIN | SUPER_ADMIN
}

service AuthService {
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc GetMe(GetMeRequest) returns (GetMeResponse);
  rpc AdminLogin(AdminLoginRequest) returns (AdminLoginResponse);
}
