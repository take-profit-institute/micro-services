syntax = "proto3";

package candle.learning.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.learning.proto";

import "google/protobuf/timestamp.proto";

// ─── Learning Service ───
service LearningService {

  // 콘텐츠 CRUD (관리자)
  rpc CreateContent(CreateContentRequest) returns (ContentResponse);
  rpc UpdateContent(UpdateContentRequest) returns (ContentResponse);
  rpc DeleteContent(DeleteContentRequest) returns (DeleteContentResponse);

  // 콘텐츠 조회
  rpc GetContent(GetContentRequest) returns (ContentDetailResponse);
  rpc ListContents(ListContentsRequest) returns (ListContentsResponse);
  rpc SearchContents(SearchContentsRequest) returns (ListContentsResponse);

  // 추천 콘텐츠
  rpc GetRecommendedContents(GetRecommendedContentsRequest) returns (ListContentsResponse);

  // 사용자 학습 상태
  rpc UpdateProgress(UpdateProgressRequest) returns (UserContentStateResponse);
  rpc CompleteContent(CompleteContentRequest) returns (UserContentStateResponse);
  rpc ToggleFavorite(ToggleFavoriteRequest) returns (UserContentStateResponse);

  // 사용자 학습 현황 (대시보드용)
  rpc GetUserLearningStats(GetUserLearningStatsRequest) returns (UserLearningStatsResponse);

  // 즐겨찾기 목록
  rpc ListFavorites(ListFavoritesRequest) returns (ListContentsResponse);
}

// ─── Enums ───
enum ContentLevel {
  CONTENT_LEVEL_UNSPECIFIED = 0;
  CONTENT_LEVEL_BEGINNER = 1;
  CONTENT_LEVEL_INTERMEDIATE = 2;
  CONTENT_LEVEL_ADVANCED = 3;
}

enum ContentSortBy {
  CONTENT_SORT_BY_UNSPECIFIED = 0;
  CONTENT_SORT_BY_LATEST = 1;
  CONTENT_SORT_BY_POPULAR = 2;     // read_count 기준
  CONTENT_SORT_BY_READ_COUNT = 3;
}

// ─── 콘텐츠 Messages ───
message CreateContentRequest {
  string title = 1;
  string description = 2;
  string category = 3;
  ContentLevel level = 4;
  string body = 5;
  int32 duration_min = 6;
  int64 xp_reward = 7;
  repeated string keywords = 8;
  bool is_published = 9;
}

message UpdateContentRequest {
  string content_id = 1;
  optional string title = 2;
  optional string description = 3;
  optional string category = 4;
  optional ContentLevel level = 5;
  optional string body = 6;
  optional int32 duration_min = 7;
  optional int64 xp_reward = 8;
  repeated string keywords = 9;
  optional bool is_published = 10;
}

message DeleteContentRequest {
  string content_id = 1;
}

message DeleteContentResponse {
  bool success = 1;
}

message GetContentRequest {
  string content_id = 1;
}

message ListContentsRequest {
  optional string category = 1;
  optional ContentLevel level = 2;
  ContentSortBy sort_by = 3;
  int32 page = 4;
  int32 size = 5;
}

message SearchContentsRequest {
  string query = 1;          // 제목 + 키워드 검색
  optional string category = 2;
  optional ContentLevel level = 3;
  int32 page = 4;
  int32 size = 5;
}

message GetRecommendedContentsRequest {
  int32 limit = 1;
}

// ─── 콘텐츠 Response ───
message ContentResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
  ContentLevel level = 5;
  int32 duration_min = 6;
  int64 xp_reward = 7;
  repeated string keywords = 8;
  bool is_published = 9;
  int64 read_count = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message ContentDetailResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
  ContentLevel level = 5;
  string body = 6;
  int32 duration_min = 7;
  int64 xp_reward = 8;
  repeated string keywords = 9;
  bool is_published = 10;
  int64 read_count = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  // 요청한 사용자의 학습 상태 (있으면)
  optional UserContentStateResponse user_state = 14;
}

message ListContentsResponse {
  repeated ContentWithStateResponse contents = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 size = 4;
}

message ContentWithStateResponse {
  ContentResponse content = 1;
  optional UserContentStateResponse user_state = 2;
}

// ─── 사용자 학습 상태 Messages ───
message UpdateProgressRequest {
  string content_id = 1;
  int32 progress_pct = 2;     // 0~100
}

message CompleteContentRequest {
  string content_id = 1;
}

message ToggleFavoriteRequest {
  string content_id = 1;
}

message UserContentStateResponse {
  string id = 1;
  string content_id = 2;
  int32 progress_pct = 3;
  bool is_completed = 4;
  bool is_favorite = 5;
  optional google.protobuf.Timestamp completed_at = 6;
  optional google.protobuf.Timestamp last_read_at = 7;
}

// ─── 학습 현황 (대시보드) ───
message GetUserLearningStatsRequest {}

message UserLearningStatsResponse {
  int32 total_contents = 1;
  int32 completed_contents = 2;
  int32 overall_progress_pct = 3;    // 전체 진도율 (UI: 22%)
  repeated CategoryProgress category_stats = 4;
}

message CategoryProgress {
  string category = 1;
  int32 total = 2;
  int32 completed = 3;
  int32 progress_pct = 4;           // UI: 기술적분석 1/3 · 33%
}

message ListFavoritesRequest {
  int32 page = 1;
  int32 size = 2;
}
