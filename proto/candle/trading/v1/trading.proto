syntax = "proto3";

package candle.trading.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.proto.trading.v1";

import "candle/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

enum OrderSide { ORDER_SIDE_UNSPECIFIED = 0; ORDER_SIDE_BUY = 1; ORDER_SIDE_SELL = 2; }
enum OrderKind { ORDER_KIND_UNSPECIFIED = 0; ORDER_KIND_MARKET = 1; ORDER_KIND_LIMIT = 2; ORDER_KIND_AFTER_HOURS_CLOSE = 3; }
enum OrderStatus { ORDER_STATUS_UNSPECIFIED = 0; ORDER_STATUS_PENDING = 1; ORDER_STATUS_FILLED = 2; ORDER_STATUS_CANCELLED = 3; ORDER_STATUS_REJECTED = 4; }
enum ReservationTiming { RESERVATION_TIMING_UNSPECIFIED = 0; RESERVATION_TIMING_OPEN = 1; RESERVATION_TIMING_PREV_CLOSE = 2; RESERVATION_TIMING_TODAY_CLOSE = 3; }
enum ReservationStatus { RESERVATION_STATUS_UNSPECIFIED = 0; RESERVATION_STATUS_RESERVED = 1; RESERVATION_STATUS_EXECUTED = 2; RESERVATION_STATUS_CANCELLED = 3; }

message AccountBalance { string user_id = 1; int64 cash = 2; int64 reserved_balance = 3; int64 available_cash = 4; int64 total_asset = 5; }
message Holding { string symbol = 1; int64 quantity = 2; int64 average_price = 3; int64 realized_profit = 4; bool active = 5; }
message Order { string id = 1; string user_id = 2; string symbol = 3; OrderSide side = 4; OrderKind kind = 5; int64 quantity = 6; int64 price = 7; OrderStatus status = 8; string parent_order_id = 9; int64 reserved_amount = 10; google.protobuf.Timestamp created_at = 11; }
message Reservation { string id = 1; string user_id = 2; string symbol = 3; OrderSide side = 4; ReservationTiming timing = 5; OrderKind kind = 6; int64 quantity = 7; int64 price = 8; string scheduled_date = 9; int64 reserved_amount = 10; ReservationStatus status = 11; string parent_order_id = 12; google.protobuf.Timestamp created_at = 13; }

message GetBalanceRequest { string user_id = 1; }
message GetBalanceResponse { AccountBalance balance = 1; }
message ListHoldingsRequest { string user_id = 1; bool include_inactive = 2; candle.common.v1.PageRequest page = 3; }
message ListHoldingsResponse { repeated Holding holdings = 1; candle.common.v1.PageResponse page = 2; }
message ListOrdersRequest { string user_id = 1; OrderStatus status = 2; candle.common.v1.PageRequest page = 3; }
message ListOrdersResponse { repeated Order orders = 1; candle.common.v1.PageResponse page = 2; }
message PlaceOrderRequest { string user_id = 1; string symbol = 2; OrderSide side = 3; OrderKind kind = 4; int64 quantity = 5; int64 price = 6; candle.common.v1.CommandMetadata command_metadata = 7; }
message PlaceOrderResponse { Order order = 1; }
message CancelOrderRequest { string user_id = 1; string order_id = 2; candle.common.v1.CommandMetadata command_metadata = 3; }
message CancelOrderResponse { Order order = 1; int64 released_amount = 2; }
// 정정 = 원주문 취소 후 parent_order_id를 가진 새 주문 생성(CAN-005/007/008).
message AmendOrderRequest { string user_id = 1; string order_id = 2; int64 quantity = 3; int64 price = 4; candle.common.v1.CommandMetadata command_metadata = 5; }
message AmendOrderResponse { Order order = 1; }

message ListReservationsRequest { string user_id = 1; ReservationStatus status = 2; candle.common.v1.PageRequest page = 3; }
message ListReservationsResponse { repeated Reservation reservations = 1; candle.common.v1.PageResponse page = 2; }
message PlaceReservationRequest { string user_id = 1; string symbol = 2; OrderSide side = 3; ReservationTiming timing = 4; OrderKind kind = 5; int64 quantity = 6; int64 price = 7; string scheduled_date = 8; candle.common.v1.CommandMetadata command_metadata = 9; }
message PlaceReservationResponse { Reservation reservation = 1; }
message CancelReservationRequest { string user_id = 1; string reservation_id = 2; candle.common.v1.CommandMetadata command_metadata = 3; }
message CancelReservationResponse { Reservation reservation = 1; int64 released_amount = 2; }
// 정정 = 원예약 취소 후 parent_order_id를 가진 새 예약 생성(CAN-006~008).
message AmendReservationRequest { string user_id = 1; string reservation_id = 2; ReservationTiming timing = 3; OrderKind kind = 4; int64 quantity = 5; int64 price = 6; string scheduled_date = 7; candle.common.v1.CommandMetadata command_metadata = 8; }
message AmendReservationResponse { Reservation reservation = 1; }

service TradingService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc ListHoldings(ListHoldingsRequest) returns (ListHoldingsResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc AmendOrder(AmendOrderRequest) returns (AmendOrderResponse);
  rpc ListReservations(ListReservationsRequest) returns (ListReservationsResponse);
  rpc PlaceReservation(PlaceReservationRequest) returns (PlaceReservationResponse);
  rpc CancelReservation(CancelReservationRequest) returns (CancelReservationResponse);
  rpc AmendReservation(AmendReservationRequest) returns (AmendReservationResponse);
}
