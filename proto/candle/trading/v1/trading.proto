syntax = "proto3";

package candle.trading.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.proto.trading.v1";

import "candle/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

enum OrderSide { ORDER_SIDE_UNSPECIFIED = 0; ORDER_SIDE_BUY = 1; ORDER_SIDE_SELL = 2; }
enum OrderKind { ORDER_KIND_UNSPECIFIED = 0; ORDER_KIND_MARKET = 1; ORDER_KIND_LIMIT = 2; ORDER_KIND_AFTER_HOURS_CLOSE = 3; }
enum OrderStatus { ORDER_STATUS_UNSPECIFIED = 0; ORDER_STATUS_PENDING = 1; ORDER_STATUS_FILLED = 2; ORDER_STATUS_CANCELLED = 3; ORDER_STATUS_REJECTED = 4; }

message AccountBalance { string user_id = 1; int64 cash = 2; int64 reserved_balance = 3; int64 available_cash = 4; int64 total_asset = 5; }
message Holding { string symbol = 1; int64 quantity = 2; int64 average_price = 3; int64 realized_profit = 4; bool active = 5; }
message Order { string id = 1; string user_id = 2; string symbol = 3; OrderSide side = 4; OrderKind kind = 5; int64 quantity = 6; int64 price = 7; OrderStatus status = 8; string parent_order_id = 9; int64 reserved_amount = 10; google.protobuf.Timestamp created_at = 11; }

message GetBalanceRequest { string user_id = 1; }
message GetBalanceResponse { AccountBalance balance = 1; }
message ListHoldingsRequest { string user_id = 1; bool include_inactive = 2; candle.common.v1.PageRequest page = 3; }
message ListHoldingsResponse { repeated Holding holdings = 1; candle.common.v1.PageResponse page = 2; }
message ListOrdersRequest { string user_id = 1; OrderStatus status = 2; candle.common.v1.PageRequest page = 3; }
message ListOrdersResponse { repeated Order orders = 1; candle.common.v1.PageResponse page = 2; }
message PlaceOrderRequest { string user_id = 1; string symbol = 2; OrderSide side = 3; OrderKind kind = 4; int64 quantity = 5; int64 price = 6; candle.common.v1.CommandMetadata command_metadata = 7; }
message PlaceOrderResponse { Order order = 1; }
message CancelOrderRequest { string user_id = 1; string order_id = 2; candle.common.v1.CommandMetadata command_metadata = 3; }
message CancelOrderResponse { Order order = 1; int64 released_amount = 2; }

service TradingService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc ListHoldings(ListHoldingsRequest) returns (ListHoldingsResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
}
