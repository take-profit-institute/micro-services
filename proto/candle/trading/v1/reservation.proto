syntax = "proto3";

package candle.trading.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.proto.trading.v1";

import "candle/common/v1/common.proto";
import "candle/trading/v1/trading_common.proto";
import "google/protobuf/timestamp.proto";

message Reservation {
  string id = 1;
  string user_id = 2;
  string symbol = 3;
  OrderSide side = 4;
  ReservationTiming timing = 5;
  OrderKind kind = 6;
  int64 quantity = 7;
  int64 price = 8;
  string scheduled_date = 9;
  int64 reserved_amount = 10;
  ReservationStatus status = 11;
  string parent_reservation_id = 12;
  string converted_order_id = 13;
  google.protobuf.Timestamp created_at = 14;
}

message ListReservationsRequest {
  string user_id = 1;
  ReservationStatus status = 2;
  candle.common.v1.PageRequest page = 3;
}
message ListReservationsResponse {
  repeated Reservation reservations = 1;
  candle.common.v1.PageResponse page = 2;
}

message PlaceReservationRequest {
  string user_id = 1;
  string symbol = 2;
  OrderSide side = 3;
  ReservationTiming timing = 4;
  OrderKind kind = 5;
  int64 quantity = 6;
  int64 price = 7;
  string scheduled_date = 8;
  candle.common.v1.CommandMetadata command_metadata = 9;
}
message PlaceReservationResponse { Reservation reservation = 1; }

message CancelReservationRequest {
  string user_id = 1;
  string reservation_id = 2;
  candle.common.v1.CommandMetadata command_metadata = 3;
}
message CancelReservationResponse {
  Reservation reservation = 1;
  int64 released_amount = 2;
}

// 정정 = 원예약 취소 후 parent_reservation_id를 가진 새 예약 생성(CAN-006~008).
message AmendReservationRequest {
  string user_id = 1;
  string reservation_id = 2;
  ReservationTiming timing = 3;
  OrderKind kind = 4;
  int64 quantity = 5;
  int64 price = 6;
  string scheduled_date = 7;
  candle.common.v1.CommandMetadata command_metadata = 8;
}
message AmendReservationResponse { Reservation reservation = 1; }

// ── 배치 전용 (BFF 노출 아님) ────────────────────────────────────────

// 09:00 배치 트리거 — OPEN+LIMIT RESERVED 예약을 CONVERTING으로 전이하고
// ReservationDue 이벤트를 Outbox에 기록한다.
message ProcessOpenLimitReservationsRequest {
  string scheduled_date = 1; // YYYY-MM-DD
}
message ProcessOpenLimitReservationsResponse {
  int32 processed_count = 1;
}

// 08:30 배치 트리거 — PREV_CLOSE 예약을 전일 종가로 즉시 체결
message ProcessPrevCloseReservationsRequest {
  string scheduled_date = 1; // YYYY-MM-DD
}
message ProcessPrevCloseReservationsResponse {
  int32 processed_count = 1;
}

// 15:40 배치 트리거 — TODAY_CLOSE 예약을 당일 종가로 즉시 체결
// 반드시 ChartService.CloseDailyCandles 완료 후 호출해야 한다.
message ProcessTodayCloseReservationsRequest {
  string scheduled_date = 1; // YYYY-MM-DD
}
message ProcessTodayCloseReservationsResponse {
  int32 processed_count = 1;
}

// order_svc가 ReservationDue를 수신해 Order를 생성한 뒤 호출한다.
// reservation을 CONVERTING → EXECUTED로 전이하고 converted_order_id를 기록한다.
message MarkReservationConvertedRequest {
  string reservation_id = 1;
  string converted_order_id = 2;
}
message MarkReservationConvertedResponse {
  Reservation reservation = 1;
}

// 15:30 배치 트리거 — 당일 CONVERTING 상태로 남은 예약을 FAILED 처리.
// ReservationDue 유실 또는 order_svc 처리 실패 케이스를 정리한다.
// ExpirePendingOrders와 같은 시점에 호출한다.
message ListStaleConvertingReservationsRequest {
  string scheduled_date = 1; // YYYY-MM-DD
}
message ListStaleConvertingReservationsResponse {
  repeated string reservation_ids = 1;
}
message FailStaleConvertingReservationRequest {
  string reservation_id = 1;
}
message FailStaleConvertingReservationResponse {
  bool failed = 1; // false면 이미 CONVERTING 아님 (skip)
}

// 건별 처리 — order의 ExpirePendingOrders/cancelExpiredPendingOrder 패턴과 동일.
// 배치가 ListOpenLimitReservations로 대상 목록을 조회한 뒤 건별로 이 RPC를 호출한다.
message ListOpenLimitReservationsRequest {
  string scheduled_date = 1; // YYYY-MM-DD
}
message ListOpenLimitReservationsResponse {
  repeated string reservation_ids = 1;
}
message ProcessSingleOpenLimitReservationRequest {
  string reservation_id = 1;
}
message ProcessSingleOpenLimitReservationResponse {
  bool processed = 1; // false면 이미 RESERVED 아님 (skip)
}

// EXPIRED 처리 — 배치가 ListExpirableReservations로 대상 목록을 조회한 뒤 건별로 호출.
// scheduled_date가 오늘이고 아직 RESERVED인 예약을 EXPIRED로 전이하고 잔고를 반환한다.
// 15:40 이후 (ProcessTodayCloseReservations 완료 후) 배치가 호출해야 한다.
message ListExpirableReservationsRequest {
  string scheduled_date = 1; // YYYY-MM-DD
}
message ListExpirableReservationsResponse {
  repeated string reservation_ids = 1;
}
message ExpireReservationRequest {
  string reservation_id = 1;
}
message ExpireReservationResponse {
  bool expired = 1; // false면 이미 RESERVED 아님 (skip)
}

service ReservationService {
  rpc ListReservations(ListReservationsRequest) returns (ListReservationsResponse);
  rpc PlaceReservation(PlaceReservationRequest) returns (PlaceReservationResponse);
  rpc CancelReservation(CancelReservationRequest) returns (CancelReservationResponse);
  rpc AmendReservation(AmendReservationRequest) returns (AmendReservationResponse);

  // 배치 전용 — 일별
  rpc ProcessOpenLimitReservations(ProcessOpenLimitReservationsRequest) returns (ProcessOpenLimitReservationsResponse);
  rpc ProcessPrevCloseReservations(ProcessPrevCloseReservationsRequest) returns (ProcessPrevCloseReservationsResponse);
  rpc ProcessTodayCloseReservations(ProcessTodayCloseReservationsRequest) returns (ProcessTodayCloseReservationsResponse);
  rpc MarkReservationConverted(MarkReservationConvertedRequest) returns (MarkReservationConvertedResponse);

  // 배치 전용 — 건별 (order의 ExpirePendingOrders 패턴과 동일)
  rpc ListOpenLimitReservations(ListOpenLimitReservationsRequest) returns (ListOpenLimitReservationsResponse);
  rpc ProcessSingleOpenLimitReservation(ProcessSingleOpenLimitReservationRequest) returns (ProcessSingleOpenLimitReservationResponse);
  rpc ListStaleConvertingReservations(ListStaleConvertingReservationsRequest) returns (ListStaleConvertingReservationsResponse);
  rpc FailStaleConvertingReservation(FailStaleConvertingReservationRequest) returns (FailStaleConvertingReservationResponse);
  rpc ListExpirableReservations(ListExpirableReservationsRequest) returns (ListExpirableReservationsResponse);
  rpc ExpireReservation(ExpireReservationRequest) returns (ExpireReservationResponse);
}