syntax = "proto3";

package candle.trading.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.proto.trading.v1";

import "candle/common/v1/common.proto";
import "candle/trading/v1/trading_common.proto";
import "google/protobuf/timestamp.proto";

message Reservation {
  string id = 1;
  string user_id = 2;
  string symbol = 3;
  OrderSide side = 4;
  ReservationTiming timing = 5;
  OrderKind kind = 6;
  int64 quantity = 7;
  int64 price = 8;
  string scheduled_date = 9;
  int64 reserved_amount = 10;
  ReservationStatus status = 11;
  string parent_order_id = 12;
  google.protobuf.Timestamp created_at = 13;
}

message ListReservationsRequest {
  string user_id = 1;
  ReservationStatus status = 2;
  candle.common.v1.PageRequest page = 3;
}
message ListReservationsResponse {
  repeated Reservation reservations = 1;
  candle.common.v1.PageResponse page = 2;
}

message PlaceReservationRequest {
  string user_id = 1;
  string symbol = 2;
  OrderSide side = 3;
  ReservationTiming timing = 4;
  OrderKind kind = 5;
  int64 quantity = 6;
  int64 price = 7;
  string scheduled_date = 8;
  candle.common.v1.CommandMetadata command_metadata = 9;
}
message PlaceReservationResponse { Reservation reservation = 1; }

message CancelReservationRequest {
  string user_id = 1;
  string reservation_id = 2;
  candle.common.v1.CommandMetadata command_metadata = 3;
}
message CancelReservationResponse {
  Reservation reservation = 1;
  int64 released_amount = 2;
}

// 정정 = 원예약 취소 후 parent_order_id를 가진 새 예약 생성(CAN-006~008).
message AmendReservationRequest {
  string user_id = 1;
  string reservation_id = 2;
  ReservationTiming timing = 3;
  OrderKind kind = 4;
  int64 quantity = 5;
  int64 price = 6;
  string scheduled_date = 7;
  candle.common.v1.CommandMetadata command_metadata = 8;
}
message AmendReservationResponse { Reservation reservation = 1; }

service ReservationService {
  rpc ListReservations(ListReservationsRequest) returns (ListReservationsResponse);
  rpc PlaceReservation(PlaceReservationRequest) returns (PlaceReservationResponse);
  rpc CancelReservation(CancelReservationRequest) returns (CancelReservationResponse);
  rpc AmendReservation(AmendReservationRequest) returns (AmendReservationResponse);
}