syntax = "proto3";

package candle.trading.v1;

option java_multiple_files = true;
option java_package = "org.profit.candle.proto.trading.v1";

import "candle/common/v1/common.proto";
import "candle/trading/v1/trading_common.proto";
import "google/protobuf/timestamp.proto";

message Order {
  string id = 1;
  string user_id = 2;
  string symbol = 3;
  OrderSide side = 4;
  OrderKind kind = 5;
  int64 quantity = 6;
  int64 price = 7;
  OrderStatus status = 8;
  string parent_order_id = 9;
  int64 reserved_amount = 10;
  google.protobuf.Timestamp created_at = 11;
  int64 executed_price = 12;       // 신규 — 체결가. 미체결(PENDING) 상태면 0
  int64 fee = 13;                  // 신규 — 수수료. 미체결 상태면 0
  int64 tax = 14;                  // 신규 — 거래세(매도만, 매수/미체결은 0)
  int64 net_amount = 15;           // 신규 — 정산금액. 미체결 상태면 0
  google.protobuf.Timestamp executed_at = 16;  // 신규 — 체결시각. 미체결 상태면 미설정
}

message ListOrdersRequest {
  string user_id = 1;
  OrderStatus status = 2;
  candle.common.v1.PageRequest page = 3;
}
message ListOrdersResponse {
  repeated Order orders = 1;
  candle.common.v1.PageResponse page = 2;
}

message PlaceOrderRequest {
  string user_id = 1;
  string symbol = 2;
  OrderSide side = 3;
  OrderKind kind = 4;
  int64 quantity = 5;
  int64 price = 6;
  candle.common.v1.CommandMetadata command_metadata = 7;
}
message PlaceOrderResponse { Order order = 1; }

message CancelOrderRequest {
  string user_id = 1;
  string order_id = 2;
  candle.common.v1.CommandMetadata command_metadata = 3;
}
message CancelOrderResponse {
  Order order = 1;
  int64 released_amount = 2;
}

// 정정 = 원주문 취소 후 parent_order_id를 가진 새 주문 생성(CAN-005/007/008).
message AmendOrderRequest {
  string user_id = 1;
  string order_id = 2;
  int64 quantity = 3;
  int64 price = 4;
  candle.common.v1.CommandMetadata command_metadata = 5;
}
message AmendOrderResponse { Order order = 1; }

// 배치(batch-service) 전용 — 정규장 마감(15:30) 후 미체결 즉시 지정가
// PENDING 주문을 일괄 취소한다. 시스템 호출이라 command_metadata(사용자
// idempotency_key)를 두지 않는다 — 멱등성은 trading-service 내부에서
// 주문 상태 전이(PENDING→CANCELLED) 자체로 보장된다.
message ExpirePendingOrdersRequest {
}
message ExpirePendingOrdersResponse {
  int32 cancelled_count = 1;
}

service OrderService {
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc AmendOrder(AmendOrderRequest) returns (AmendOrderResponse);
  rpc ExpirePendingOrders(ExpirePendingOrdersRequest) returns (ExpirePendingOrdersResponse);

}