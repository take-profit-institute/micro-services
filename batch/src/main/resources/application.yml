spring:
  application:
    name: candle-batch
  main:
    web-application-type: none

  datasource:
    url: ${BATCH_DB_URL:jdbc:postgresql://localhost:5432/candle?currentSchema=batch,public}
    username: ${BATCH_DB_USERNAME:candle}
    password: ${BATCH_DB_PASSWORD:candle}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:migration

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  grpc:
    server:
      port: ${BATCH_GRPC_PORT:50062}
    client:
      channel:
        market:
          target: ${BATCH_MARKET_GRPC_TARGET:static://localhost:50063}
          ssl:
            enabled: false
        stock:
          target: ${BATCH_STOCK_GRPC_TARGET:static://localhost:50060}
          ssl:
            enabled: false
        trading:
          target: ${BATCH_TRADING_GRPC_TARGET:static://localhost:50054}
          ssl:
            enabled: false
        portfolio:
          target: ${BATCH_PORTFOLIO_GRPC_TARGET:static://localhost:50055}
          ssl:
            enabled: false
        ranking:
          target: ${BATCH_RANKING_GRPC_TARGET:static://localhost:50056}
          ssl:
            enabled: false

batch:
  ranking:
    enabled: ${BATCH_RANKING_ENABLED:false}
    cron: "${BATCH_RANKING_CRON:0 20 16 * * MON-FRI}"
    grpc-target: ranking
    deadline-millis: ${BATCH_RANKING_DEADLINE_MILLIS:120000}
  schedule:
    zone-id: Asia/Seoul
    smoke:
      enabled: ${BATCH_SMOKE_ENABLED:true}
      cron: "${BATCH_SMOKE_CRON:0 */1 * * * *}"
    portfolio-eod:
      enabled: ${BATCH_PORTFOLIO_EOD_ENABLED:false}
      cron: "${BATCH_PORTFOLIO_EOD_CRON:0 0 16 * * MON-FRI}"
      chunk-size: ${BATCH_PORTFOLIO_EOD_CHUNK_SIZE:100}
      symbol-batch-size: ${BATCH_PORTFOLIO_EOD_SYMBOL_BATCH_SIZE:500}
    stock-sync:
      enabled: ${BATCH_STOCK_SYNC_ENABLED:false}
      cron: "${BATCH_STOCK_SYNC_CRON:0 30 16 * * MON-FRI}"
    market-order-book:
      enabled: ${BATCH_MARKET_ORDER_BOOK_ENABLED:false}
      cron: "${BATCH_MARKET_ORDER_BOOK_CRON:0 */1 * * * MON-FRI}"
      deadline-millis: ${BATCH_MARKET_ORDER_BOOK_DEADLINE_MILLIS:120000}
    trading:
      enabled: ${BATCH_TRADING_ENABLED:false}
      previous-close-cron: "${BATCH_TRADING_PREVIOUS_CLOSE_CRON:0 30 8 * * MON-FRI}"
      open-limit-cron: "${BATCH_TRADING_OPEN_LIMIT_CRON:0 0 9 * * MON-FRI}"
      market-close-cron: "${BATCH_TRADING_MARKET_CLOSE_CRON:0 30 15 * * MON-FRI}"
      today-close-cron: "${BATCH_TRADING_TODAY_CLOSE_CRON:0 40 15 * * MON-FRI}"
  grpc:
    market-target: market
    stock-target: stock
    trading-target: trading
    portfolio-target: portfolio
    read-deadline-millis: ${BATCH_GRPC_READ_DEADLINE_MILLIS:300}
    write-deadline-millis: ${BATCH_GRPC_WRITE_DEADLINE_MILLIS:1000}
    stock-sync-deadline-millis: ${BATCH_STOCK_SYNC_DEADLINE_MILLIS:120000}
    trading-batch-deadline-millis: ${BATCH_TRADING_JOB_DEADLINE_MILLIS:120000}

logging:
  level:
    org.profit.candle.batch: info
    org.springframework.batch: info
