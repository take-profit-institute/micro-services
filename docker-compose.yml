# 로컬 개발용 백킹 서비스 (AWS 없이 전 서비스 로컬 실행)
# 기본: postgres / timescaledb / redis / redpanda(kafka) / mailhog / bff / gateway
# 옵션 profile: ui(redpanda console) · services(Spring 컨테이너)
#
#   docker compose up -d                                        # 백킹 서비스 + bff + gateway
#   docker compose --profile ui up -d                          # + redpanda console
#   docker compose --profile services up -d                    # + Spring 서비스 컨테이너
# Spring을 호스트에서 실행: ./gradlew :services:user-service:bootRun
name: candle-local-v2

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql
      - ./deploy/local/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # market 전용 시계열 DB (운영의 TimescaleDB StatefulSet 대용)
  timescaledb:
    image: timescale/timescaledb:2.17.1-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: market
    ports: ["5433:5432"]
    volumes:
      - tsdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: ["6379:6379"]

  # Kafka 호환 단일 바이너리(가벼움). 운영 MSK 대용(로컬은 PLAINTEXT)
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092" # 호스트 앱 → localhost:9092
    volumes:
      - rpdata:/var/lib/redpanda/data

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP (notification-service가 발송)
      - "8025:8025" # 웹 UI (받은 메일 확인)

  # ── 옵션: redpanda console (Kafka UI) ──
  redpanda-console:
    image: redpandadata/console:v2.7.2
    profiles: ["ui"]
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports: ["8088:8080"]
    depends_on: [redpanda]

  # ── 옵션: bff 컨테이너 (소스 대신 이미지로) ──
  # webapp repo에서 빌드/푸시한 이미지를 가져다 씀. 안 쓰면 webapp repo에서 직접 실행.
  bff:
    image: ${BFF_IMAGE:-yyubin/candle-bff:dev}
    environment:
      PORT: "8080" # bff는 PORT 사용(기본 4000)
      HOST: "0.0.0.0"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      REDIS_URL: redis://redis:6379
      # admin 토큰 검증(JWKS/RS256). JWKS는 컨테이너→호스트 auth-service, issuer는 토큰 iss와 일치.
      AUTH_JWKS_URI: http://host.docker.internal:8081/.well-known/jwks.json
      AUTH_JWT_ISSUER: http://localhost:8081
      AUTH_JWT_AUDIENCE: candle-api
      # 실제 마이크로서비스로 gRPC 라우팅 (mock 아님)
      DATA_SOURCE: grpc
      # gRPC 서비스는 호스트에서 로컬 실행 (50051~50060)
      GRPC_AUTH_ADDR:         host.docker.internal:50051
      GRPC_USER_ADDR:         host.docker.internal:50052
      GRPC_MARKET_ADDR:       host.docker.internal:50063
      GRPC_ACCOUNT_ADDR:      host.docker.internal:50054
      GRPC_PORTFOLIO_ADDR:    host.docker.internal:50055
      GRPC_RANKING_ADDR:      host.docker.internal:50056
      GRPC_NOTIFICATION_ADDR: host.docker.internal:50057
      GRPC_MISSION_ADDR:      host.docker.internal:50058
      GRPC_LEARN_ADDR:        host.docker.internal:50059
      GRPC_STOCK_ADDR:        host.docker.internal:50060
      GRPC_WISHLIST_ADDR:     host.docker.internal:50061
      GRPC_BATCH_ADDR:        host.docker.internal:50062
      GRPC_NEWS_ADDR:         host.docker.internal:50064
    ports: ["8080:8080"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      redis:
        condition: service_started

  # ── 개발용 API Gateway ──────────────────────────────────────────────
  # JWT 검증 → X-Account-Id 헤더 주입 → 라우팅 (프로덕션 API Gateway 역할 대체)
  #
  # 기본 compose는 bff 컨테이너도 함께 올리므로 GATEWAY_BFF_URI 기본값은 docker network 서비스명(bff)을 쓴다.
  # BFF를 호스트에서 따로 실행하려면 .env에서 GATEWAY_BFF_URI=http://host.docker.internal:8080 으로 덮어쓴다.
  gateway:
    image: ${GATEWAY_IMAGE:-yyubin/candle-gateway:dev}
    environment:
      GATEWAY_PORT: "8000"
      # JWT 검증(JWKS/RS256). JWKS는 컨테이너→호스트 auth-service, issuer는 토큰 iss와 일치.
      GATEWAY_JWT_JWK_SET_URI: http://host.docker.internal:8081/.well-known/jwks.json
      GATEWAY_JWT_ISSUER: http://localhost:8081
      GATEWAY_JWT_AUDIENCE: candle-api
      # auth-service 주소: 'services' 프로파일 사용 시 http://auth-service:8081
      GATEWAY_AUTH_URI: ${GATEWAY_AUTH_URI:-http://host.docker.internal:8081}
      GATEWAY_BFF_URI: ${GATEWAY_BFF_URI:-http://bff:8080}
      # 채팅 방 배정 REST(/chat/rooms) 주소: 'services' 프로파일 사용 시 http://chatting-service:8090
      # (/chat/ws WebSocket은 운영 시 ALB가 직접 passthrough — 이 게이트웨이는 REST만 프록시)
      GATEWAY_CHAT_URI: ${GATEWAY_CHAT_URI:-http://host.docker.internal:8090}
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost,capacitor://localhost}
    ports: ["8000:8000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      bff:
        condition: service_started

volumes:
  pgdata:
  tsdata:
  rpdata:
