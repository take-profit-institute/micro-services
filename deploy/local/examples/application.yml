# 예제: 서비스 application.yml (각 services/<svc>/src/main/resources/ 에 배치)
# 핵심: env-with-defaults → k8s에선 ESO가 주입한 env(host/username/password/dbname)가 채우고,
#       로컬에선 기본값(localhost...)이 채운다. → 같은 파일로 양쪽 동작.
spring:
  application:
    name: auth-service            # 서비스마다 변경
  datasource:
    # ESO Secret 키: host/port/username/password/dbname (소문자) 와 동일
    url: jdbc:postgresql://${host:localhost}:${port:5432}/${dbname:auth}   # dbname 서비스별 변경
    username: ${username:postgres}
    password: ${password:postgres}
  data:
    redis:
      host: ${redis-host:localhost}
      port: ${redis-port:6379}
  kafka:
    bootstrap-servers: ${kafka-bootstrap:localhost:9092}

server:
  port: ${SERVER_PORT:8081}       # k8s는 SERVER_PORT=8080 주입, 로컬은 서비스별 기본(8081~)

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus  # actuator health + /actuator/prometheus
# gRPC 서버 포트(grpc-server-spring-boot-starter 기준)
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}  # 로컬 서비스별로 다르게(겹치지 않게) 두거나 9090
