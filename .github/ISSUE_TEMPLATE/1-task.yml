name: "🔧 작업"
description: "특정 도메인/서비스에 대한 기능 구현, 수정, 리팩토링 등 작업 단위 이슈입니다."
title: "[ ] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📌 작성 전 확인해주세요
        - 제목의 `[ ]` 안에 담당 도메인을 적어주세요. 예: `[notification]`, `[user]`, `[trading]`, `[common]` 등
        - 구두/카톡으로 전달하지 않고 **모든 작업은 GitHub Issue로 발행**합니다.
  - type: textarea
    id: tasks
    attributes:
      label: "작업 개요/내용"
      description: "무엇을 할 지, 왜 하는 것인지 등을 적어주세요. 형식은 무관합니다."
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: "참고 자료 (선택)"
    validations:
      required: false