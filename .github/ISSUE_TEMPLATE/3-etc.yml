name: "📝 기타"
description: "위 두 항목에 해당하지 않는 공유, 논의, 메모 등 자유 양식 이슈입니다."
title: "[ETC] "
labels: ["etc"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📌 작성 전 확인해주세요
        - 구두/카톡으로 전달하지 않고 **모든 이슈는 GitHub Issue로 발행**합니다.
        - 형식은 자유입니다. 아래 항목은 참고용 가이드일 뿐, 비워두거나 자유롭게 작성해도 됩니다.
        - 민감하다고 느껴지는 내용은 댓글 작성 시 쿠션어(용용체 등)를 사용해주세요. 🙏
  - type: textarea
    id: content
    attributes:
      label: "✏️ 내용"
      description: "공유하고 싶은 내용, 논의 사항, 메모 등을 자유롭게 작성해주세요."
      placeholder: |
        예: 다음 회의 전에 미리 공유드리고 싶은 내용이 있어 남깁니다.
        - ...
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: "📎 참고 자료 (선택)"
      description: "관련 링크, 캡처, PR/이슈 링크 등이 있다면 첨부해주세요."
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: "확인"
      options:
        - label: "구두/카톡이 아닌 이슈로 먼저 공유했습니다."
          required: true