name: "💡 개발 건의사항"
description: "코드 개선, 구조 변경, 공통 모듈 추가 등 개발 관련 건의사항을 제안할 때 사용합니다."
title: "[PROPOSAL] "
labels: ["proposal"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📌 작성 전 확인해주세요
        - 건의사항은 **대안 혹은 원하는 방향까지 구체적으로** 제시해주세요. (막연한 문제 제기 X)
        - 민감하다고 느껴지는 내용은 댓글 작성 시 쿠션어(용용체 등)를 사용해주세요. 🙏

  - type: textarea
    id: background
    attributes:
      label: "🔍 건의 배경 / 현재 상황"
      description: "왜 이 건의가 필요한지, 현재 어떤 상태인지 설명해주세요."
      placeholder: "예: 해당 부분이 도메인적으로 중요한데 테스트코드가 작성되어 있지 않습니다."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "💡 제안 내용"
      description: "구체적으로 무엇을 어떻게 바꾸자는 건지 적어주세요."
    validations:
      required: true

  - type: textarea
    id: alternative
    attributes:
      label: "🎯 대안 혹은 원하는 방향 (필수)"
      description: "구체적인 시나리오, 코드 예시, 적용 범위 등을 명시해주세요."
      placeholder: |
        예: 다음 테스트 시나리오 추가 요청
        - 케이스 1: ~~ 입력 시 ~~ 반환
        - 케이스 2: ~~ 예외 발생 시 ~~ 처리
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      options:
        - "🔴 높음 (다음 작업 전 반영 필요)"
        - "🟡 중간 (스프린트 내 반영 희망)"
        - "🟢 낮음 (여유 있을 때 검토)"
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: "확인"
      options:
        - label: "구두/카톡이 아닌 이슈로 먼저 공유했습니다."
          required: true