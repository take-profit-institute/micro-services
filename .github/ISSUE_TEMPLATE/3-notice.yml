name: "📢 공지 / 전달사항"
description: "팀 전체가 알아야 하는 결정사항, 변경사항을 전달할 때 사용합니다. 답변/논의가 필요한 건의는 '개발 건의사항' 또는 '기타' 사용해주세요."
title: "[NOTICE] "
labels: ["notice"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📌 작성 전 확인해주세요
        - 이미 결정되었거나 확정된 내용을 전달하는 용도입니다. 논의가 필요하면 '💡 개발 건의사항' 또는 '📝 기타'를 사용해주세요.
        - 구두/카톡으로 전달하지 않고 **모든 공지는 GitHub Issue로 발행**합니다.
  - type: textarea
    id: content
    attributes:
      label: "📢 전달 내용"
      description: "무엇이 어떻게 바뀌었는지/결정되었는지 적어주세요."
      placeholder: |
        예: Git 컨벤션 문서에 chore 브랜치 타입을 추가했습니다.
        - 적용 범위: .gitignore, Issue/PR 템플릿 등 레포 메타 설정
        - 브랜치 형식: chore/{issue번호}-{설명}
        - main에서 직접 분기 가능 (hotfix와 동일하나 일반 PR 절차 적용)
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: "📎 관련 문서/PR (선택)"
      description: "관련 문서 링크, PR, 커밋 등이 있다면 첨부해주세요."
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: "확인"
      options:
        - label: "구두/카톡이 아닌 이슈로 먼저 공유했습니다."
          required: true