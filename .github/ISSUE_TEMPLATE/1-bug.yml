name: "🐛 버그 / 개발환경 이슈"
description: "버그 발생, 개발환경 이슈를 보고할 때 사용합니다."
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📌 작성 전 확인해주세요
        - 구두/카톡으로 전달하지 않고 **모든 이슈는 GitHub Issue로 발행**합니다.
        - 실행 절차 / 예상 결과 / 실제 결과를 **구체적으로** 작성해주세요.
        - 민감하다고 느껴지는 내용은 댓글 작성 시 쿠션어(용용체 등)를 사용해주세요. 🙏

  - type: textarea
    id: environment
    attributes:
      label: "🖥️ 발생 환경"
      description: "OS, 브랜치, 로컬/개발/운영 환경, 사용 도구/버전 등을 적어주세요."
      placeholder: |
        - 환경: local / dev / staging / prod
        - 브랜치: feature/xxx
        - OS / 버전:
        - 기타:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🪜 실행 절차 (Steps to Reproduce)"
      description: "재현 가능한 순서대로, 입력값까지 구체적으로 적어주세요."
      placeholder: |
        1. ~~ 페이지/API에서
        2. 입력값 ~~ 를 입력
        3. ~~ 버튼 클릭
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ 예상 결과"
      description: "정상적으로 동작했을 때 나와야 하는 결과"
      placeholder: "예: 결과값으로 a가 나와야 함"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ 실제 결과"
      description: "실제로 발생한 결과 (에러 메시지, 스크린샷, 로그 등 첨부 가능)"
      placeholder: "예: 결과값으로 b가 나옴 / 에러 메시지: ..."
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: "📎 추가 정보 (선택)"
      description: "스크린샷, 로그, 관련 PR/이슈 링크 등"
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: "확인"
      options:
        - label: "구두/카톡이 아닌 이슈로 먼저 공유했습니다."
          required: true