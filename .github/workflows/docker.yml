# main 브랜치 push → 변경된 서비스만 Docker Hub 빌드·푸시
# PR        → 빌드만 (push 없음), 컴파일 오류 조기 감지
# 수동 실행  → 전체 또는 지정 서비스 강제 빌드 (gateway 포함 가능)
#
# 필수 Repository Secrets:
#   DOCKERHUB_USERNAME  – Docker Hub 사용자명 (예: yyubin)
#   DOCKERHUB_TOKEN     – Docker Hub Access Token (Settings → Security → New Token)

name: Docker Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: '빌드할 서비스 (쉼표 구분, 비우면 전체 빌드). gateway 포함 가능'
        required: false
        default: ''

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/candle

jobs:
  # ── 1. 변경 감지 ────────────────────────────────────────────────────────
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      matrix:  ${{ steps.set-matrix.outputs.matrix }}
      empty:   ${{ steps.set-matrix.outputs.empty }}
      gateway: ${{ steps.set-matrix.outputs.gateway }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            user-service:
              - 'services/user-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            market-service:
              - 'services/market-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            stock-service:
              - 'services/stock-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            trading-service:
              - 'services/trading-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            portfolio-service:
              - 'services/portfolio-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            ranking-service:
              - 'services/ranking-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            mission-service:
              - 'services/mission-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            learning-service:
              - 'services/learning-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            notification-service:
              - 'services/notification-service/**'
              - 'common/**'
              - 'proto/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            chatting-service:
              # 채팅 WS 게이트웨이 — proto/gRPC 미사용이라 proto/** 제외
              - 'services/chatting-service/**'
              - 'common/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'build.gradle'
              - 'settings.gradle'
            gateway:
              - 'gateway/**'
              - 'build.gradle'
              - 'settings.gradle'

      - name: Set build matrix
        id: set-matrix
        env:
          DISPATCH_INPUT:  ${{ github.event.inputs.services }}
          F_AUTH:          ${{ steps.filter.outputs.auth-service }}
          F_USER:          ${{ steps.filter.outputs.user-service }}
          F_MARKET:        ${{ steps.filter.outputs.market-service }}
          F_STOCK:         ${{ steps.filter.outputs.stock-service }}
          F_TRADING:       ${{ steps.filter.outputs.trading-service }}
          F_PORTFOLIO:     ${{ steps.filter.outputs.portfolio-service }}
          F_RANKING:       ${{ steps.filter.outputs.ranking-service }}
          F_MISSION:       ${{ steps.filter.outputs.mission-service }}
          F_LEARNING:      ${{ steps.filter.outputs.learning-service }}
          F_NOTIFICATION:  ${{ steps.filter.outputs.notification-service }}
          F_CHATTING:      ${{ steps.filter.outputs.chatting-service }}
          F_GATEWAY:       ${{ steps.filter.outputs.gateway }}
        run: |
          ALL_SERVICES='["auth-service","user-service","market-service","stock-service","trading-service","portfolio-service","ranking-service","mission-service","learning-service","notification-service","chatting-service"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "$DISPATCH_INPUT" ]; then
              # 입력 없음 → 전체 빌드 (gateway 포함)
              echo "matrix=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
              echo "empty=false"          >> "$GITHUB_OUTPUT"
              echo "gateway=true"         >> "$GITHUB_OUTPUT"
            else
              # 쉼표 구분 목록 파싱, gateway는 별도 처리
              SVCLIST=$(echo "$DISPATCH_INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' | grep -v '^gateway$')
              if [ -n "$SVCLIST" ]; then
                JSON=$(echo "$SVCLIST" | jq -R . | jq -sc .)
                echo "matrix=$JSON"  >> "$GITHUB_OUTPUT"
                echo "empty=false"   >> "$GITHUB_OUTPUT"
              else
                echo "matrix=[]"     >> "$GITHUB_OUTPUT"
                echo "empty=true"    >> "$GITHUB_OUTPUT"
              fi
              # gateway가 목록에 있거나 목록이 비어 있으면(전체) true
              if echo "$DISPATCH_INPUT" | grep -q "gateway"; then
                echo "gateway=true"  >> "$GITHUB_OUTPUT"
              else
                echo "gateway=false" >> "$GITHUB_OUTPUT"
              fi
            fi
            exit 0
          fi

          # push / PR: paths-filter 결과로 빌드 대상 결정
          SERVICES=()
          [ "$F_AUTH"         = "true" ] && SERVICES+=(auth-service)
          [ "$F_USER"         = "true" ] && SERVICES+=(user-service)
          [ "$F_MARKET"       = "true" ] && SERVICES+=(market-service)
          [ "$F_STOCK"        = "true" ] && SERVICES+=(stock-service)
          [ "$F_TRADING"      = "true" ] && SERVICES+=(trading-service)
          [ "$F_PORTFOLIO"    = "true" ] && SERVICES+=(portfolio-service)
          [ "$F_RANKING"      = "true" ] && SERVICES+=(ranking-service)
          [ "$F_MISSION"      = "true" ] && SERVICES+=(mission-service)
          [ "$F_LEARNING"     = "true" ] && SERVICES+=(learning-service)
          [ "$F_NOTIFICATION" = "true" ] && SERVICES+=(notification-service)
          [ "$F_CHATTING"     = "true" ] && SERVICES+=(chatting-service)

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo "matrix=[]"    >> "$GITHUB_OUTPUT"
            echo "empty=true"   >> "$GITHUB_OUTPUT"
          else
            JSON="["
            for i in "${!SERVICES[@]}"; do
              [ "$i" -gt 0 ] && JSON+=","
              JSON+="\"${SERVICES[$i]}\""
            done
            JSON+="]"
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
            echo "empty=false"  >> "$GITHUB_OUTPUT"
          fi

          echo "gateway=$F_GATEWAY" >> "$GITHUB_OUTPUT"

  # ── 2. 마이크로서비스 빌드 & 푸시 (변경된 서비스 병렬 실행) ────────────
  build:
    name: Build ${{ matrix.service }}
    needs: detect
    if: needs.detect.outputs.empty == 'false'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: SERVICE_MODULE=${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:dev
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=docker-${{ matrix.service }}

  # ── 3. Gateway 빌드 & 푸시 ──────────────────────────────────────────────
  build-gateway:
    name: Build gateway
    needs: detect
    if: needs.detect.outputs.gateway == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-gateway:dev
            ${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}
          cache-from: type=gha,scope=docker-gateway
          cache-to:   type=gha,mode=max,scope=docker-gateway
