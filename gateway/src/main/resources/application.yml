spring:
  application:
    name: gateway
  codec:
    max-in-memory-size: 10MB

server:
  port: ${GATEWAY_PORT:8000}

gateway:
  jwt:
    hmac-secret: ${AUTH_JWT_HMAC_SECRET:change-me-in-production-change-me-in-production}
  route:
    auth-uri: ${GATEWAY_AUTH_URI:http://localhost:8081}
    bff-uri: ${GATEWAY_BFF_URI:http://localhost:8080}
  cors:
    # 프로덕션 + vercel 프리뷰 도메인(webapp-webapp-<hash>-<scope>.vercel.app) 매칭
    allowed-origin-patterns: http://localhost:3000,https://webapp-webapp.vercel.app,https://webapp-webapp-*.vercel.app

management:
  endpoints:
    web:
      exposure:
        include: health
