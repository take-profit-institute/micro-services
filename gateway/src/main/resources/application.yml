spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # /api/v1/auth/** → auth-service 직접 (JWT 검증 없이 통과)
        - id: auth-service
          uri: ${GATEWAY_AUTH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        # 나머지 /** → BFF (JWT 필수, X-Account-Id 자동 주입)
        - id: bff
          uri: ${GATEWAY_BFF_URI:http://localhost:8080}
          predicates:
            - Path=/**

server:
  port: ${GATEWAY_PORT:8000}

gateway:
  jwt:
    hmac-secret: ${AUTH_JWT_HMAC_SECRET:change-me-in-production-change-me-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health
