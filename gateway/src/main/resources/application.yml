spring:
  application:
    name: gateway
  codec:
    max-in-memory-size: 10MB

server:
  port: ${GATEWAY_PORT:8000}

gateway:
  jwt:
    hmac-secret: ${AUTH_JWT_HMAC_SECRET:change-me-in-production-change-me-in-production}
  route:
    auth-uri: ${GATEWAY_AUTH_URI:http://localhost:8081}
    bff-uri: ${GATEWAY_BFF_URI:http://localhost:8080}
    # /chat/rooms/** REST 방 배정. /chat/ws(WebSocket)는 운영 시 ALB가 직접 passthrough.
    chat-uri: ${GATEWAY_CHAT_URI:http://localhost:8090}
  cors:
    # 웹: 로컬 + 프로덕션 + vercel 프리뷰 도메인(webapp-webapp-<hash>-<scope>.vercel.app)
    # 앱: Capacitor origin — Android는 http://localhost(capacitor.config androidScheme:'http'),
    #     iOS(WKWebView)는 capacitor://localhost
    allowed-origin-patterns: ${GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS:${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://webapp-webapp.vercel.app,https://webapp-webapp-*.vercel.app,http://localhost,capacitor://localhost}}

management:
  endpoints:
    web:
      exposure:
        include: health
